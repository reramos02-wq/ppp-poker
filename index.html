function renderBuyinMgmt(){
  const s = DB.stages.find(x=>x.id===BUYIN_MGMT);
  if(!s) return "<div class='sec'>Etapa não encontrada.</div>";

  if(BUYIN_PLAYER) return renderBuyinPlayer(s);

  const tabDefs = [
    {key:"entradas",  label:"💵 Entradas"},
    {key:"custos",    label:"🧾 Custos"},
    {key:"premiacao", label:"🏆 Premiação"},
    {key:"geral",     label:"📋 Resumo Geral"},
  ];
  const tabsHtml = `
  <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;overflow-x:auto">
    ${tabDefs.map(t=>`
    <button data-bi-tab="${t.key}" style="background:none;border:none;border-bottom:${BUYIN_TAB===t.key?"2px solid var(--yellow)":"2px solid transparent"};color:${BUYIN_TAB===t.key?"var(--yellow)":"var(--muted)"};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:8px 12px;cursor:pointer;margin-bottom:-2px;white-space:nowrap;flex-shrink:0">
      ${t.label}
    </button>`).join("")}
  </div>`;

  const header = `
    <button id="btn-bi-back" class="btn bo mb10" style="font-size:12px">‹ Voltar à etapa</button>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:#fff;margin-bottom:4px">💰 Financeiro</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">${s.name} · Buy-in: ${s.buyin||"—"}</div>
    ${tabsHtml}`;

  let body = "";
  if(BUYIN_TAB==="entradas")       body = renderBuyinEntradas(s);
  else if(BUYIN_TAB==="custos")    body = renderBuyinCustos(s);
  else if(BUYIN_TAB==="premiacao") body = renderBuyinPremiacao(s);
  else if(BUYIN_TAB==="geral")     body = renderBuyinGeral(s);

  return `<div class="sec">${header}${body}</div>`;
}

// ── ABA: ENTRADAS (lista de jogadores + add/remove) ─────────────────────────
function renderBuyinEntradas(s){
  const vals = getBuyinValues(s);
  const ins  = s.inscriptions||[];

  const playerRows = ins.map((uid,i)=>{
    const pl = getP(uid)||{name:uid,nickname:"?"};
    const rec = getBuyinRecord(s, uid);
    const total = vals.buyin + rec.rs*vals.rs + rec.rd*vals.rd + (rec.addon?vals.addon:0);
    return `<div data-bi-player="${uid}" style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer">
      <div style="color:var(--muted);font-size:12px;width:22px;text-align:center;flex-shrink:0">${i+1}</div>
      ${AV(uid)}
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;color:#fff;font-size:14px">${pl.nickname||pl.name}</div>
        <div style="font-size:11px;color:var(--muted)">
          Buy-in ✓${rec.rs>0?` · RS×${rec.rs}`:""}${rec.rd>0?` · RD×${rec.rd}`:""}${rec.addon?" · Add-on ✓":""}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;color:var(--yellow)">${fmtBRL(total)}</div>
        <div style="font-size:10px;color:var(--muted)">total</div>
      </div>
      <div style="color:var(--muted);font-size:18px;flex-shrink:0">›</div>
    </div>`;
  }).join("");

  const addPanel = `
  <div style="margin-top:16px;border-top:2px solid var(--yellow);padding-top:14px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px">Adicionar jogador</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input id="bi-search" type="text" placeholder="Buscar jogador..." style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;color:#fff;font-size:13px"/>
    </div>
    <div id="bi-search-results" style="max-height:180px;overflow-y:auto"></div>
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
      <button id="bi-new-player-btn" class="btn bo sm">＋ Novo jogador</button>
    </div>
  </div>`;

  return `
    <div class="card" style="padding:0 12px">
      ${ins.length===0?'<div style="color:var(--muted);font-size:13px;padding:16px 0">Nenhum inscrito ainda.</div>':playerRows}
    </div>
    ${addPanel}`;
}

// ── ABA: CUSTOS ───────────────────────────────────────────────────────────────
function renderBuyinCustos(s){
  const fin = getFinanceData(s);
  const arrecadado = calcArrecadado(s);
  const custosFixos = calcCustosFixos(fin);
  const potFinal = calcPotFinal(s);
  const taxaFT = calcTaxaFT(s);
  const potLiquido = calcPotLiquido(s);

  const dealersHtml = (fin.dealers||[]).map((d,i)=>`

        <span style="position:absolute;left:9px;top:9px;color:var(--muted);font-size:13px">R$</span>
        <input data-dealer-cost="${i}" type="number" value="${d.cost}" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px 8px 30px;color:#fff;font-size:13px"/>
      </div>
      ${(fin.dealers||[]).length>1?`<button data-dealer-remove="${i}" style="background:none;border:1px solid var(--red);color:var(--red);border-radius:4px;width:34px;height:34px;cursor:pointer;flex-shrink:0">✕</button>`:""}
    </div>`).join("");

  const extrasHtml = (fin.extraCosts||[]).map((e,i)=>`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px" data-extra-row="${i}">
      <input data-extra-label="${i}" value="${e.label||""}" placeholder="Descrição do custo" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;color:#fff;font-size:13px"/>
      <div style="position:relative;width:110px">
        <span style="position:absolute;left:9px;top:9px;color:var(--muted);font-size:13px">R$</span>
        <input data-extra-value="${i}" type="number" value="${e.value}" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px 8px 30px;color:#fff;font-size:13px"/>
      </div>
      <button data-extra-remove="${i}" style="background:none;border:1px solid var(--red);color:var(--red);border-radius:4px;width:34px;height:34px;cursor:pointer;flex-shrink:0">✕</button>
    </div>`).join("");

  return `
    <!-- Floor -->
    <div class="card" style="margin-bottom:12px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:1.5px;color:var(--yellow);text-transform:uppercase;margin-bottom:10px">Floor</div>
      <div style="display:flex;gap:8px;align-items:center">

// ── ABA: PREMIAÇÃO (ITM) ──────────────────────────────────────────────────────
function renderBuyinPremiacao(s){
  const fin = getFinanceData(s);
  const numPlayers = (s.inscriptions||[]).length;
  const potLiquido = calcPotLiquido(s);
  const premios = calcPremiacao(s);
  const caixinhaTorneio = Number(fin.caixinhaTorneio)||0;
  const totalAPremiar = potLiquido - caixinhaTorneio;

  // Validation indicators
  const sumPct = premios.reduce((sum,p)=>sum+p.pct,0);
  const sumValue = premios.reduce((sum,p)=>sum+p.value,0);
  const pctOk = Math.abs(sumPct-100) < 0.01;
  const valueOk = Math.abs(sumValue-totalAPremiar) < 0.5; // 50 cent tolerance for rounding

  const rows = premios.map((p,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)" data-prize-row="${i}">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:var(--yellow);width:28px;flex-shrink:0">${p.position}º</div>
      <div style="width:75px;flex-shrink:0">
        <div style="position:relative">
          <input data-prize-pct="${i}" type="number" value="${p.pct}" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:6px 18px 6px 8px;color:#fff;font-size:13px;box-sizing:border-box"/>
          <span style="position:absolute;right:8px;top:7px;color:var(--muted);font-size:12px">%</span>
        </div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="position:relative">
          <span style="position:absolute;left:8px;top:7px;color:var(--muted);font-size:12px">R$</span>
          <input data-prize-value="${i}" type="number" step="0.01" value="${p.value.toFixed(2)}" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:6px 8px 6px 28px;color:#fff;font-size:13px;font-weight:700;box-sizing:border-box;text-align:right"/>
        </div>
      </div>
      ${premios.length>2?`<button data-prize-remove="${i}" style="background:none;border:1px solid var(--red);color:var(--red);border-radius:4px;width:30px;height:30px;cursor:pointer;flex-shrink:0;font-size:12px">✕</button>`:""}
    </div>`).join("");

  return `
    <div style="background:var(--surface2);border:1px solid var(--yellow);border-radius:6px;padding:12px 16px;margin-bottom:16px">
      <div style="font-size:12px;color:var(--muted)">Pot Líquido (base do cálculo)</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--yellow)">${fmtBRL(potLiquido)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${numPlayers} inscritos · Faixa ITM aplicada automaticamente</div>
    </div>

    <!-- Caixinha Torneio — synced with Custos tab (same fin.caixinhaTorneio field) -->
    <div class="card" style="margin-bottom:16px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:1.5px;color:var(--yellow);text-transform:uppercase;margin-bottom:8px">Caixinha Torneio</div>
      <div style="position:relative;margin-bottom:8px">
        <span style="position:absolute;left:9px;top:9px;color:var(--muted);font-size:13px">R$</span>
        <input id="bi-caixinha-torneio-prem" type="number" value="${fin.caixinhaTorneio}" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px 8px 30px;color:#fff;font-size:13px;box-sizing:border-box"/>
      </div>
      <div style="font-size:11px;color:var(--muted)">Descontada do Pot Líquido antes da distribuição da premiação.</div>
      <div style="display:flex;justify-content:space-between;padding-top:8px;margin-top:8px;border-top:1px solid var(--border)">
        <span style="color:var(--muted);font-size:12px">Total a Premiar</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--yellow)">${fmtBRL(totalAPremiar)}</span>
      </div>
    </div>

    <div class="card" style="padding:0 12px">${rows}</div>

    <!-- Validation indicators -->
    <div style="display:flex;gap:10px;margin-top:14px">
      <div style="flex:1;background:var(--surface2);border:1px solid ${pctOk?"var(--green)":"var(--red)"};border-radius:6px;padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Soma das %</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:${pctOk?"var(--green)":"var(--red)"}">${pctOk?"✓":"⚠"} ${sumPct.toFixed(2)}%</div>
      </div>
      <div style="flex:1;background:var(--surface2);border:1px solid ${valueOk?"var(--green)":"var(--red)"};border-radius:6px;padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Soma dos Prêmios</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:${valueOk?"var(--green)":"var(--red)"}">${valueOk?"✓":"⚠"} ${fmtBRL(sumValue)}</div>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button id="bi-add-prize-pos" class="btn bo sm">＋ Adicionar Posição</button>

      <button id="bi-reset-prizes" class="btn bo sm" style="color:var(--muted)">↺ Recalcular Automático</button>
    </div>`;
}

// ── ABA: RESUMO GERAL ─────────────────────────────────────────────────────────
function renderBuyinGeral(s){
  const vals = getBuyinValues(s);
  const fin = getFinanceData(s);
  const ins = s.inscriptions||[];
  const premios = calcPremiacao(s);
  const arrecadado = calcArrecadado(s);
  const custosFixos = calcCustosFixos(fin);
  const potFinal = calcPotFinal(s);
  const potLiquido = calcPotLiquido(s);
  const staffPayouts = calcStaffPayouts(s);

  // Match results (positions) to players, if the stage has results published
  const results = s.results || [];

  const playerRows = ins.map(uid=>{
    const pl = getP(uid)||{name:uid,nickname:"?"};
    const rec = getBuyinRecord(s, uid);
    const total = vals.buyin + rec.rs*vals.rs + rec.rd*vals.rd + (rec.addon?vals.addon:0);
    const result = results.find(r=>r.playerId===uid);
    const prize = result ? (premios.find(p=>p.position===result.position)?.value || 0) : 0;
    const saldo = prize - total;
    const isPaid = !!rec.paid;
    return `<tr>
      <td style="padding:8px 6px;border-bottom:1px solid var(--border);color:#fff;font-size:13px">${pl.nickname||pl.name}</td>
      <td style="padding:8px 6px;border-bottom:1px solid var(--border);color:var(--muted);font-size:13px;text-align:center">${result?result.position+"º":"—"}</td>
      <td style="padding:8px 6px;border-bottom:1px solid var(--border);color:#fff;font-size:13px;text-align:right">${fmtBRL(total)}</td>
      <td style="padding:8px 6px;border-bottom:1px solid var(--border);color:${prize>0?"var(--yellow)":"var(--muted)"};font-size:13px;text-align:right;font-weight:${prize>0?"700":"400"}">${prize>0?fmtBRL(prize):"—"}</td>
      <td style="padding:8px 6px;border-bottom:1px solid var(--border);font-size:13px;text-align:right;font-weight:700;color:${saldo<0?"var(--red)":saldo>0?"var(--green)":"var(--muted)"}">${saldo===0?"—":(saldo>0?"+":"")+fmtBRL(saldo)}</td>
      <td style="padding:8px 6px;border-bottom:1px solid var(--border);text-align:center">
        <input type="checkbox" data-paid-uid="${uid}" ${isPaid?"checked":""} style="width:18px;height:18px;cursor:pointer;accent-color:var(--yellow)"/>
      </td>
    </tr>`;
  }).join("");

  const staffRows = staffPayouts.map(st=>`
    <div class="row" style="justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="color:#fff;font-size:13px;font-weight:600">${st.role}${st.name!=="—"?" — "+st.name:""}</div>
        <div style="font-size:11px;color:var(--muted)">Base ${fmtBRL(st.base)}${st.share>0?` + Caixinha ${fmtBRL(st.share)}`:""}</div>
      </div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--yellow)">${fmtBRL(st.total)}</div>
    </div>`).join("");

  return `
    <div id="bi-geral-export">
      <div style="background:var(--surface2);border:1px solid var(--yellow);border-radius:6px;padding:14px 16px;margin-bottom:16px">
        <div class="row" style="justify-content:space-between;padding:3px 0"><span style="color:var(--muted);font-size:12px">Arrecadado</span><span style="color:#fff;font-size:13px">${fmtBRL(arrecadado)}</span></div>
        <div class="row" style="justify-content:space-between;padding:3px 0"><span style="color:var(--muted);font-size:12px">Custos Fixos</span><span style="color:var(--red);font-size:13px">− ${fmtBRL(custosFixos)}</span></div>
        <div class="row" style="justify-content:space-between;padding:3px 0"><span style="color:#fff;font-size:13px;font-weight:700">Pot Final</span><span style="color:var(--yellow);font-size:15px;font-weight:900">${fmtBRL(potFinal)}</span></div>
        <div class="row" style="justify-content:space-between;padding:3px 0"><span style="color:#fff;font-size:13px;font-weight:700">Pot Líquido</span><span style="color:var(--yellow);font-size:15px;font-weight:900">${fmtBRL(potLiquido)}</span></div>
      </div>

      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Jogadores</div>
      <div style="overflow-x:auto;margin-bottom:18px">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="border-bottom:2px solid var(--yellow)">
            <th style="padding:6px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase">Jogador</th>
            <th style="padding:6px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase">Pos.</th>
            <th style="padding:6px;text-align:right;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase">Entrada</th>
            <th style="padding:6px;text-align:right;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase">Prêmio</th>
            <th style="padding:6px;text-align:right;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase">Saldo Final</th>
            <th style="padding:6px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase">Pago</th>
          </tr></thead>
          <tbody>${playerRows}</tbody>
        </table>
      </div>

      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Custos (Floor / Dealers)</div>
      <div class="card">${staffRows}</div>
    </div>

    <button id="bi-export-geral" class="btn by fw" style="margin-top:16px">📸 Exportar Resumo (WhatsApp)</button>`;
}

// ── AUDIT ─────────────────────────────────────────────────────────────────────
function renderToolsAudit(){
  const players = DB.players;
  const stages  = DB.stages;
  const allResultUids = new Set();
  stages.forEach(s=>(s.results||[]).forEach(r=>allResultUids.add(r.playerId)));
  const playerUids = new Set(players.map(p=>p.uid));

  // Duplicates
  const nameMap={};
  players.forEach(p=>{const k=(p.name||"").toLowerCase().trim();if(!nameMap[k])nameMap[k]=[];nameMap[k].push(p);});
  const dupes = Object.entries(nameMap).filter(([k,v])=>v.length>1);
  const uidMap={};
  players.forEach(p=>{if(!uidMap[p.uid])uidMap[p.uid]=[];uidMap[p.uid].push(p);});
  const uidDupes = Object.entries(uidMap).filter(([k,v])=>v.length>1);

  // Ghost UIDs
  const ghosts=[...allResultUids].filter(u=>!playerUids.has(u));

  // No email
  const noEmail=players.filter(p=>!p.email||p.email.trim()==="");
  const mocks=players.filter(p=>p.uid.startsWith("p_"));

  return `<div>
    <button class="btn bo mb10 sm" id="btn-tools-back">‹ Ferramentas</button>

    <!-- Summary -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div class="ps"><div class="psv">${players.length}</div><div class="psl">Total jogadores</div></div>
      <div class="ps" style="${ghosts.length>0?"border-color:var(--red)":""}"><div class="psv" style="${ghosts.length>0?"color:var(--red)":""}">${ghosts.length}</div><div class="psl">UIDs fantasma</div></div>
      <div class="ps" style="${uidDupes.length>0?"border-color:var(--red)":""}"><div class="psv" style="${uidDupes.length>0?"color:var(--red)":""}">${uidDupes.length}</div><div class="psl">UIDs duplicados</div></div>
      <div class="ps"><div class="psv">${mocks.length}</div><div class="psl">Sem conta (p_*)</div></div>
    </div>

    ${ghosts.length>0?`
    <div class="card" style="border-left:3px solid var(--red);margin-bottom:10px">
      <div style="font-weight:700;color:var(--red);margin-bottom:8px">❌ UIDs Fantasma (${ghosts.length})</div>
      ${ghosts.map(uid=>{
        const inStages=stages.filter(s=>(s.results||[]).find(r=>r.playerId===uid)).map(s=>s.name);
        return `<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">
          <div style="color:var(--red);font-family:monospace">${uid}</div>
          <div style="color:var(--muted)">em: ${inStages.join(", ")}</div>
        </div>`;
      }).join("")}
    </div>`:""}

    ${uidDupes.length>0?`
    <div class="card" style="border-left:3px solid var(--red);margin-bottom:10px">
      <div style="font-weight:700;color:var(--red);margin-bottom:8px">⚠ UIDs Duplicados (${uidDupes.length})</div>
      ${uidDupes.map(([uid,list])=>`
        <div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">
          <div style="font-size:10px;color:var(--muted);font-family:monospace">${uid}</div>
          ${list.map(p=>`<div style="font-size:12px;color:#fff;padding:2px 0">${p.name} / "${p.nickname}" ${p.email?`· ${p.email}`:""}</div>`).join("")}
        </div>`).join("")}
      <button class="btn by sm mt8" id="btn-fix-dupes-audit">🧹 Limpar duplicatas agora</button>
    </div>`:""}

    ${dupes.length>0?`
    <div class="card" style="border-left:3px solid var(--yellow);margin-bottom:10px">
      <div style="font-weight:700;color:var(--yellow);margin-bottom:8px">⚠ Nomes Duplicados (${dupes.length})</div>
      ${dupes.map(([name,list])=>`
        <div style="margin-bottom:8px">
          <div style="font-size:12px;font-weight:600;color:#fff">${list[0].name}</div>
          ${list.map(p=>`<div style="font-size:11px;color:var(--muted)">${p.uid} · ${p.email||"sem email"}</div>`).join("")}
        </div>`).join("")}
    </div>`:""}

    ${ghosts.length===0&&uidDupes.length===0&&dupes.length===0?`
    <div class="card" style="border-left:3px solid var(--green)">
      <div style="color:var(--green);font-weight:700">🎉 Base saudável! Nenhum problema encontrado.</div>
    </div>`:""}

    <!-- Export -->
    <button class="btn bo sm mt8" id="btn-audit-export">📋 Exportar JSON</button>
    <div id="tools-log" style="background:#111;border:1px solid #333;padding:12px;border-radius:4px;font-size:12px;font-family:monospace;line-height:2;margin-top:8px;display:none"></div>
  </div>`;
}

function toolsLog(msg, cls=""){
  const el = document.getElementById("tools-log");
  if(!el) return;
  el.style.display = "block";
  const color = cls==="ok"?"#2ecc71":cls==="err"?"#e74c3c":cls==="warn"?"#F5A800":"#aaa";
  el.innerHTML += `<div style="color:${color}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function runFixDupes(){
  const snap = await getDoc(doc(db,"seasons",ACTIVE_SEASON));
  const data = snap.data();
  let players = [...(data.players||[])];
  const stages = data.stages||[];
  const admins = data.admins||[];
  const before = players.length;
  const seen=new Map();
  const cleaned=[];
  players.forEach(p=>{
    if(!seen.has(p.uid)){
      seen.set(p.uid,cleaned.length);
      cleaned.push({...p});
    } else {
      const idx=seen.get(p.uid);
      const existing=cleaned[idx];
      const pIsUser = p.email && p.nickname && p.nickname!==p.name.split(" ")[0];
      const eIsUser = existing.email && existing.nickname && existing.nickname!==existing.name.split(" ")[0];
      if(pIsUser && !eIsUser){ cleaned[idx]={...p}; toolsLog(`🔄 Preferindo: "${p.name}"`, "ok"); }
      else { toolsLog(`🗑️ Removido: "${p.name}"`, "warn"); }
    }
  });
  await setDoc(doc(db,"seasons",ACTIVE_SEASON),{players:cleaned,stages,admins,updatedAt:serverTimestamp()});
  DB.players=cleaned;
  toolsLog(`✅ ${before} → ${cleaned.length} jogadores (${before-cleaned.length} removidos)`, "ok");
}

let autoSaveTimer = null;

function openResultModal(sid){
  var stage=DB.stages.find(function(s){return s.id===sid;});
  if(!stage)return;
  resultStage=stage;
  var draft=stage.draft||[];
  var results=stage.results||[];
  var base=(stage.inscriptions||[]).map(function(uid){
    var dr=draft.find(function(r){return r.uid===uid;});
    var ex=results.find(function(r){return r.playerId===uid;});
    if(dr) return {uid:uid, pos:dr.pos||"", ko:dr.ko||"0"};
    if(ex) return {uid:uid, pos:String(ex.position), ko:String(ex.knockouts||0)};
    return {uid:uid, pos:"", ko:"0"};
  });
  results.forEach(function(r){
    if(!base.find(function(x){return x.uid===r.playerId;}))
      base.push({uid:r.playerId, pos:String(r.position), ko:String(r.knockouts||0)});
  });
  resultRows=base;
  drawResultModal();
}

function autoSaveDraft(){
  if(!resultStage)return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(function(){
    DB.stages=DB.stages.map(function(s){
      if(s.id!==resultStage.id)return s;
      return Object.assign({},s,{draft:resultRows.map(function(r){return {uid:r.uid,pos:r.pos,ko:r.ko};})});
    });
    save();
    var ind=document.getElementById("autosave-ind");
    if(ind){ind.textContent="✓ Salvo";ind.style.color="var(--green)";}
    setTimeout(function(){var ind=document.getElementById("autosave-ind");if(ind)ind.textContent="";},2000);
  },800);
}

function drawResultModal(){
  var s=resultStage;
  var isKO=s.type==="knockout";
  var hasPublished=s.status==="finished";
  var maxPos=Math.max(resultRows.length,2);

  function takenBy(exceptUid){
    return resultRows.filter(function(r){return r.uid!==exceptUid&&r.pos&&parseInt(r.pos)>0;}).map(function(r){return parseInt(r.pos);});
  }
  function sortedRows(){
    return resultRows.slice().sort(function(a,b){
      var pa=parseInt(a.pos)>0?parseInt(a.pos):9999;
      var pb=parseInt(b.pos)>0?parseInt(b.pos):9999;
      return pa-pb;
    });
  }
  var notIn=DB.players.filter(function(p){return !resultRows.find(function(r){return r.uid===p.uid;});});
  var wrap=document.getElementById("result-modal");
  wrap.innerHTML="";
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;padding:12px;box-sizing:border-box;";
  wrap.appendChild(ov);
  var box=document.createElement("div");
  box.style.cssText="background:var(--surface);border-top:3px solid var(--yellow);border:1px solid var(--border);border-radius:4px;padding:20px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-sizing:border-box;";
  ["click","mousedown","touchstart"].forEach(function(ev){box.addEventListener(ev,function(e){e.stopPropagation();},{passive:true});});
  ov.appendChild(box);
  var tRow=document.createElement("div");
  tRow.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px";
  tRow.innerHTML="<b style=\"font-family:'Barlow Condensed',sans-serif;font-size:20px;color:#fff;text-transform:uppercase;letter-spacing:1px\">Resultado \u2014 "+s.name+"</b><span id='autosave-ind' style='font-size:11px;color:var(--muted)'></span>";
  box.appendChild(tRow);
  var bn=document.createElement("div");
  bn.style.cssText="font-size:12px;padding:8px 12px;border-radius:3px;margin-bottom:12px;border:1px solid;"+(hasPublished?"background:rgba(46,204,113,.1);color:var(--green);border-color:rgba(46,204,113,.3);":"background:rgba(245,168,0,.08);color:var(--yellow);border-color:rgba(245,168,0,.2);");
  bn.textContent=hasPublished?"\u2713 Resultado publicado":"\uD83D\uDD8A Rascunho \u2014 preencha e publique ao final";
  box.appendChild(bn);
  var hdr=document.createElement("div");
  hdr.style.cssText="display:grid;grid-template-columns:1fr 110px"+(isKO?" 80px":"")+";gap:8px;padding:0 4px;margin-bottom:6px;";

  box.appendChild(hdr);
  var listEl=document.createElement("div");
  box.appendChild(listEl);

  function rebuildList(){
    listEl.innerHTML="";
    sortedRows().forEach(function(row){
      var pl=getP(row.uid)||{name:"?",nickname:"?"};
      var curPos=parseInt(row.pos)>0?parseInt(row.pos):0;
      var pts=curPos?getPts(curPos):0;
      var rd=document.createElement("div");
      rd.style.cssText="display:grid;grid-template-columns:1fr 110px"+(isKO?" 80px":"")+";gap:8px;margin-bottom:8px;align-items:center;padding:10px 10px;border-radius:4px;border:2px solid "+(curPos?"var(--yellow)":"var(--border)")+";background:"+(curPos?"var(--surface2)":"var(--surface)")+";";
      var info=document.createElement("div");
      info.style.cssText="display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden";
      info.innerHTML="<div class='av' style='width:32px;height:32px;font-size:10px;flex-shrink:0'>"+ini(pl.name)+"</div><div style='min-width:0'><div style='font-size:14px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis'>"+pl.nickname+"</div><div style='font-size:11px;font-weight:700;font-family:Barlow Condensed,sans-serif;color:"+(curPos?"var(--yellow)":"var(--muted)")+"'>"+(curPos?curPos+"\u00ba \u00b7 "+pts+" pts":"sem posi\u00e7\u00e3o")+"</div></div>";
      rd.appendChild(info);
      var ps=document.createElement("select");
      ps.style.cssText="background:var(--surface2);border:2px solid "+(curPos?"var(--yellow)":"var(--border2)")+";border-radius:4px;color:#fff;padding:10px 2px;text-align:center;text-align-last:center;font-size:17px;font-family:Barlow Condensed,sans-serif;font-weight:900;width:100%;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;";
      var optsHtml="<option value=''>—</option>";
      for(var i=1;i<=maxPos;i++) optsHtml+="<option value='"+i+"'"+(curPos===i?" selected":"")+">"+i+"\u00ba</option>";
      ps.innerHTML=optsHtml;
      (function(rowRef,psEl,rdEl){
        psEl.addEventListener("change",function(){
          var newPos=parseInt(psEl.value)||0;
          var oldPos=parseInt(rowRef.pos)||0;
          if(newPos>0&&newPos!==oldPos){
            var shifted=[];
            function shiftDown(pos,skipUid){
              var occupant=resultRows.find(function(r){return r.uid!==skipUid&&parseInt(r.pos)===pos;});
              if(occupant&&shifted.indexOf(occupant.uid)<0){shifted.push(occupant.uid);shiftDown(pos+1,occupant.uid);occupant.pos=String(pos+1);}
            }
            shiftDown(newPos,rowRef.uid);
          }
          rowRef.pos=psEl.value;
          maxPos=Math.max(maxPos,resultRows.reduce(function(m,r){return Math.max(m,parseInt(r.pos)||0);},0));
          autoSaveDraft();
          rebuildList();
        });
      })(row,ps,rd);
      rd.appendChild(ps);
      if(isKO){
        var curKO=parseInt(row.ko)||0;
        var ks=document.createElement("input");
        ks.type="number";
        ks.inputMode="numeric";
        ks.pattern="[0-9]*";
        ks.min="0";
        ks.value=curKO;
        ks.placeholder="0";
        ks.style.cssText="background:var(--surface2);border:2px solid var(--border2);border-radius:4px;color:#fff;padding:10px 6px;text-align:center;font-size:15px;font-family:Barlow Condensed,sans-serif;font-weight:700;width:100%;outline:none;box-sizing:border-box;";
        ks.addEventListener("input",function(){var v=parseInt(ks.value);if(isNaN(v)||v<0){v=0;ks.value=0;}row.ko=v;autoSaveDraft();});
        ks.addEventListener("blur",function(){if(ks.value===""||isNaN(parseInt(ks.value))){ks.value=0;row.ko=0;autoSaveDraft();}});
        rd.appendChild(ks);
      }
      listEl.appendChild(rd);
    });
  }
  rebuildList();

  if(notIn.length){
    var addSec=document.createElement("div");
    addSec.style.cssText="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)";
    addSec.innerHTML="<div class='lbl' style='margin-bottom:8px'>Adicionar jogador \u00e0 etapa</div>";
    var addRow=document.createElement("div");
    addRow.style.cssText="display:flex;gap:8px";
    var addSel=document.createElement("select");
    addSel.style.cssText="flex:1;background:var(--surface2);border:2px solid var(--border2);border-radius:4px;color:#fff;padding:10px 12px;font-size:14px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;";
    addSel.innerHTML="<option value=''>Selecionar jogador...</option>"+notIn.map(function(p){return "<option value='"+p.uid+"'>"+p.nickname+" \u2014 "+p.name+"</option>";}).join("");
    var addBtn=document.createElement("button");
    addBtn.className="btn by";addBtn.style.cssText="padding:10px 16px;white-space:nowrap;flex-shrink:0";addBtn.textContent="+ Adicionar";
    addBtn.addEventListener("click",function(){var uid=addSel.value;if(!uid)return;if(!resultRows.find(function(r){return r.uid===uid;})){resultRows.push({uid:uid,pos:"",ko:"0"});drawResultModal();}});
    addRow.appendChild(addSel);addRow.appendChild(addBtn);addSec.appendChild(addRow);box.appendChild(addSec);
  }
  var hint=document.createElement("div");
  hint.style.cssText="font-size:11px;color:var(--muted);margin-top:12px;margin-bottom:16px";
  hint.textContent="Posi\u00e7\u00f5es j\u00e1 usadas ficam desativadas. Rascunho salvo automaticamente.";
  box.appendChild(hint);
  var btns=document.createElement("div");btns.className="row g8";
  var pubBtn=document.createElement("button");pubBtn.className="btn fw";pubBtn.style.cssText="background:var(--green);color:#000;font-size:15px;font-weight:900";
  pubBtn.textContent=hasPublished?"\u2713 Atualizar Publica\u00e7\u00e3o":"\uD83C\uDFC1 Publicar Resultado";
  pubBtn.addEventListener("click",function(){
    clearTimeout(autoSaveTimer); // cancel pending draft save before publishing
    var filled=resultRows.filter(function(r){return r.pos&&parseInt(r.pos)>0;});
    if(!filled.length){showToast("Selecione pelo menos uma posição antes de publicar.","red");return;}
    var results=filled.sort(function(a,b){return parseInt(a.pos)-parseInt(b.pos);}).map(function(r){return {playerId:r.uid,position:parseInt(r.pos),points:getPts(parseInt(r.pos)),knockouts:parseInt(r.ko)||0};});
    DB.stages=DB.stages.map(function(st){return st.id===resultStage.id?Object.assign({},st,{status:"finished",results:results,draft:null}):st;});
    save();closeResultModal();render();
  });
  btns.appendChild(pubBtn);
  var closeBtn=document.createElement("button");closeBtn.className="btn bo";closeBtn.textContent="Fechar";closeBtn.addEventListener("click",closeResultModal);
  btns.appendChild(closeBtn);box.appendChild(btns);
}

// Export podium as image
window.exportPodium = async function(){
  const el = document.getElementById("podium-export");
  if(!el){ showToast("Pódio não encontrado","red"); return; }
  try {
    if(!window.html2canvas){
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload=res; s.onerror=rej;
        document.head.appendChild(s);
      });
    }
    showToast("Gerando imagem...","green");

    // Collect all external photo URLs from the podium element (img + background-image)
    const _urlToDataUri = (url) => new Promise(resolve => {
      if(!url || url.startsWith("data:")) return resolve(url);
      const ctrl = new AbortController();
      const t = setTimeout(() => { ctrl.abort(); resolve(null); }, 5000);
      fetch(url, {signal: ctrl.signal})
        .then(r => r.ok ? r.blob() : null)
        .then(blob => {
          clearTimeout(t);
          if(!blob) return resolve(null);
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(blob);
        })
        .catch(() => { clearTimeout(t); resolve(null); });
    });

    // Clone the element so we can mutate without affecting the live DOM
    const clone = el.cloneNode(true);
    clone.style.position = "fixed";
    clone.style.left = "-9999px";
    clone.style.top = "0";
    clone.style.width = el.offsetWidth + "px";
    document.body.appendChild(clone);

    // Replace all <img src> with data URIs
    const cloneImgs = Array.from(clone.querySelectorAll("img"));
    await Promise.race([
      Promise.allSettled(cloneImgs.map(async img => {
        const src = img.src;
        if(!src || src.startsWith("data:")) return;
        const dataUri = await _urlToDataUri(src);
        if(dataUri) img.src = dataUri;
        else img.style.display = "none";
      })),
      new Promise(res => setTimeout(res, 8000))
    ]);

    // Replace all background-image: url(...) with data URIs
    const allEls = Array.from(clone.querySelectorAll("*"));
    await Promise.race([
      Promise.allSettled(allEls.map(async node => {
        const bg = node.style.backgroundImage || getComputedStyle(node).backgroundImage;
        const match = bg && bg.match(/url\(["']?([^"')]+)["']?\)/);
        if(!match) return;
        const url = match[1];
        if(!url || url.startsWith("data:")) return;
        const dataUri = await _urlToDataUri(url);
        if(dataUri) node.style.backgroundImage = "url('" + dataUri + "')";
        else node.style.backgroundImage = "none";
      })),
      new Promise(res => setTimeout(res, 8000))
    ]);

    const canvas = await html2canvas(clone, {
      backgroundColor:"#1a1a1a",
      scale:2,
      allowTaint:false,
      useCORS:false,
      logging:false
    });

    document.body.removeChild(clone);
    const link = document.createElement("a");
    link.download = "podium-ppp-poker.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    showToast("Imagem salva!","green");
  } catch(e){
    showToast("Erro ao exportar: "+e.message,"red");
  }
};

function bindProfileSetup(){

    const nick = document.getElementById("setup-nick")?.value.trim();
    const errEl = document.getElementById("setup-err");

    if(!name || name.length < 2){
      errEl.innerHTML = '<div class="err-msg">Nome completo é obrigatório (mínimo 2 caracteres).</div>';
      return;
    }
    if(!nick || nick.length < 2){
      errEl.innerHTML = '<div class="err-msg">Apelido é obrigatório (mínimo 2 caracteres).</div>';
      return;
    }

    const btn = document.getElementById("btn-setup-save");
    btn.disabled = true;
    btn.textContent = "Salvando...";

    try {
      // Update Firebase Auth
      await updateProfile(CURRENT_USER, { displayName: name });

      // Update player in DB
      const idx = DB.players.findIndex(p=>p.uid===CURRENT_USER_UID);
      if(idx>=0){
        DB.players[idx] = {...DB.players[idx], name, nickname:nick, needsSetup:false};
        CURRENT_PLAYER = DB.players[idx];
      } else {
        const p = {uid:CURRENT_USER_UID, name, nickname:nick, email:CURRENT_USER.email||"", season:ACTIVE_SEASON, needsSetup:false};
        DB.players.push(p);
        CURRENT_PLAYER = p;
      }
      await savePlayers();
      render();
    } catch(e){
      errEl.innerHTML = `<div class="err-msg">Erro: ${e.message}</div>`;
      btn.disabled = false;
      btn.textContent = "✓ Entrar no PPP Poker";
    }
  });

  // Enter key on nick field
  document.getElementById("setup-nick")?.addEventListener("keydown", e=>{
    if(e.key==="Enter") document.getElementById("btn-setup-save")?.click();
  });

  // Auto-fill nick from name
  document.getElementById("setup-name")?.addEventListener("blur", function(){
    const nickEl = document.getElementById("setup-nick");

      nickEl.value = this.value.trim().split(" ")[0];
    }
  });

    stopListeners();
    await signOut(auth);
  });
}

function showLoginError(code){
  const el = document.getElementById("login-err");
  if(!el) return;
  const messages = {
    "auth/missing-name": "Por favor, informe seu nome completo.",
    "auth/missing-nick": "Por favor, informe seu apelido.",
    "auth/missing-fields": "Preencha email e senha.",
    "auth/missing-email": "Informe seu email.",
    "auth/reset-sent": "Email de redefinição enviado! Verifique sua caixa de entrada.",
    "auth/invalid-email": "Email inválido.",
    "auth/email-already-in-use": "Este email já está cadastrado.",
    "auth/weak-password": "Senha muito curta. Use ao menos 6 caracteres.",
    "auth/wrong-password": "Senha incorreta.",
    "auth/user-not-found": "Usuário não encontrado.",
    "auth/invalid-credential": "Email ou senha incorretos.",
    "auth/too-many-requests": "Muitas tentativas. Aguarde um momento e tente novamente."
  };
  const msg = messages[code] || "Erro: "+code;
  const isSuccess = code==="auth/reset-sent";
  el.innerHTML = `<div style="background:${isSuccess?'rgba(46,204,113,.12)':'rgba(231,76,60,.12)'};border:1px solid ${isSuccess?'#2ecc71':'#e74c3c'};color:${isSuccess?'#2ecc71':'#e74c3c'};padding:10px 12px;border-radius:6px;font-size:13px;margin-bottom:12px">${msg}</div>`;
}

  document.querySelectorAll("[data-prize-pct]").forEach(el=>{

  window.saveDiagnoseEdit = async function(uidB64){
    const oldUid = decodeURIComponent(escape(atob(uidB64)));
    const newName  = document.getElementById("new-name")?.value.trim();
    const newNick  = document.getElementById("new-nick")?.value.trim();
    const newEmail = document.getElementById("new-email")?.value.trim();
    const newUid   = document.getElementById("new-uid")?.value.trim();
    const msgEl    = document.getElementById("dedit-msg");

    // Get current player to use as fallback
    const cur = DB.players.find(p=>p.uid===oldUid)||{};
    const finalName  = newName  || cur.name     || "";
    const finalNick  = newNick  || cur.nickname || "";
    const finalEmail = newEmail || cur.email    || "";
    const finalUid   = (newUid && newUid.length>5) ? newUid : oldUid;

    if(!finalName){
      if(msgEl) msgEl.innerHTML='<div class="err-msg">Nome não pode ficar vazio.</div>';
      return;
    }

    if(msgEl) msgEl.innerHTML='<div style="color:var(--yellow);font-size:12px">Salvando...</div>';

    try {
      const snap  = await getDoc(doc(db,"seasons",ACTIVE_SEASON));
      const data  = snap.data();
      let players = [...(data.players||[])];
      let stages  = [...(data.stages||[])];
      const admins= data.admins||[];

      // Update or create player entry
      const pidx = players.findIndex(p=>p.uid===oldUid);
      const updated = {uid:finalUid, name:finalName, nickname:finalNick, email:finalEmail, season:ACTIVE_SEASON};
      if(pidx>=0){ players[pidx]={...players[pidx],...updated}; }
      else { players.push(updated); }

      // Update stages if UID changed
      if(finalUid !== oldUid){
        let stFixed=0;
        stages = stages.map(s=>{
          let mod=false;
          const results=(s.results||[]).map(r=>{ if(r.playerId===oldUid){mod=true;return{...r,playerId:finalUid};} return r;});
          const ins=(s.inscriptions||[]).map(u=>{ if(u===oldUid){mod=true;return finalUid;} return u;});
          if(mod){stFixed++;return{...s,results,inscriptions:ins};}
          return s;
        });
        /* stages updated */
      }

      // Dedup
      const seen=new Set();
      players=players.filter(p=>{ if(seen.has(p.uid))return false; seen.add(p.uid);return true; });

      await setDoc(doc(db,"seasons",ACTIVE_SEASON),{players,stages,admins,updatedAt:serverTimestamp()});
      DB.players=players; DB.stages=stages;
      DIAGNOSE_EDIT_UID=null;
      TOOLS_VIEW="diagnose";
      const _m=document.getElementById("result-modal"); if(_m) _m.innerHTML="";
      showToast("✅ Jogador atualizado!","green");
      render();
    } catch(e){
      if(msgEl) msgEl.innerHTML=`<div class="err-msg">Erro: ${e.message}</div>`;
    }
  };

        showToast(player.nickname+" agora é admin!","green");
      }
      await save();
      render();
    });
  });

  // Delete player
  document.querySelectorAll("[data-del-player]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const uid = btn.dataset.delPlayer;
      const player = DB.players.find(p=>p.uid===uid);
      if(!player) return;
      if(!confirm("Excluir "+player.name+"? Os resultados dele nas etapas serão mantidos.")) return;
      DB.players = DB.players.filter(p=>p.uid!==uid);
      await save();
      showToast(player.name+" removido.","green");
      render();
    });
  });
}

// ── START ─────────────────────────────────────────────────────────────────────
// Re-render on real layout changes (rotation, window resize) but NOT on virtual
// keyboard open/close — keyboard only changes height, not width, and toggling
// it shouldn't tear down the DOM while the user has an input focused (this was
// causing edit fields to lose focus instantly, looking like they "wouldn't open").
let _lastViewportWidth = window.innerWidth;
let _resizeDebounce = null;
window.addEventListener("resize",()=>{
  clearTimeout(_resizeDebounce);
  _resizeDebounce = setTimeout(()=>{
    const widthChanged = window.innerWidth !== _lastViewportWidth;
    _lastViewportWidth = window.innerWidth;
    // Only re-render if width actually changed (rotation/real resize).
    // Height-only changes (virtual keyboard) are ignored.
    if(widthChanged && CURRENT_USER) render();
  }, 250);
});

// Show error if Firebase fails to connect
window.addEventListener('unhandledrejection', function(e){
  if(e.reason && e.reason.code && e.reason.code.includes('firebase')){
    document.getElementById('app').innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#0e0e0e">' +
      '<div style="text-align:center;color:#e74c3c;font-family:Barlow Condensed,sans-serif">' +
      '<div style="font-size:40px;margin-bottom:12px">⚠️</div>' +
      '<div style="font-size:20px;font-weight:700;letter-spacing:1px;margin-bottom:8px">Erro de conexão Firebase</div>' +
      '<div style="font-size:13px;color:#666">Verifique o appId no código.<br>' + e.reason.code + '</div>' +
      '</div></div>';
  }
});

dbg("6. Aguardando auth...");
onAuthStateChanged(auth, async (user) => {
  _authResolved = true;
  clearTimeout(_authTimeout);
  dbg("7. Auth state: " + (user ? "logado " + user.email : "deslogado"));
  dbg("8. Iniciando fluxo...");
  if(user){
    CURRENT_USER     = user;
    CURRENT_USER_UID = user.uid;
    IS_ADMIN         = ADMIN_EMAILS.includes(user.email) || (DB.admins||[]).includes(user.email) || (DB.admins||[]).includes(user.uid);
    dbg("9. Admin: " + IS_ADMIN);
    try {
      dbg("12. Iniciando listeners...");
      startListeners(user); // pass user so we can link after data loads
      dbg("13. Listeners OK");
    } catch(e) {
      dbg("ERRO startListeners: " + e.message);
    }
    initNotifState().catch(()=>{});
  } else {
    CURRENT_USER     = null;
    CURRENT_USER_UID = null;
    CURRENT_PLAYER   = null;
    IS_ADMIN         = false;
    stopListeners();
    document.getElementById("app").innerHTML = renderLoginScreen();
    bindLoginEvents();
  }
});

// ── ENSURE PLAYER PROFILE ─────────────────────────────────────────────────────
async function ensurePlayerProfile(user){
  let player = DB.players.find(p=>p.uid===user.uid);
  let needsSave = false;

  if(!player){
    // 1. Match by email
    if(user.email){
      player = DB.players.find(p=>p.email && p.email.toLowerCase()===user.email.toLowerCase());
    }

    // 2. Match by displayName (normalize: lowercase, no accents, trim)
    if(!player && user.displayName){
      const norm = s => (s||"").toLowerCase().normalize("NFD")
        .replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9 ]/g,"").trim();
      // Handle "Nome|Apelido" format from signup
      const rawDisplay = user.displayName.includes("|")
        ? user.displayName.split("|")[0].trim()
        : user.displayName;
      const normDisplay = norm(rawDisplay);
      player = DB.players.find(p=>{
        const normName = norm(p.name||"");
        // Full name match
        if(normName === normDisplay) return true;
        // First + last name match (handles "Victor Asdourian" vs "victor asdourian")
        const partsA = normDisplay.split(" ").filter(Boolean);
        const partsB = normName.split(" ").filter(Boolean);
        if(partsA.length>=2 && partsB.length>=2){
          return partsA[0]===partsB[0] && partsA[partsA.length-1]===partsB[partsB.length-1];
        }
        return false;
      });
    }

    if(player){
      // Link Firebase uid — user's own data ALWAYS wins over pre-created seed data
      player.uid   = user.uid;
      player.email = user.email || player.email;

      let rawName = (user.displayName||"").trim();

      if(rawName.includes("|")){
        // Email/password signup: "Nome|Apelido" format
        const parts = rawName.split("|");
        const userN = parts[0].trim();
        const userNick = parts[1].trim();
        if(userN)    player.name     = userN;
        if(userNick) player.nickname = userNick;
        try{ await updateProfile(user,{displayName:userN}); }catch(e){}
      } else if(rawName && !rawName.includes("@")){
        // Google login with real displayName: use it as name
        player.name = rawName;
        // Keep existing nickname if pre-created, otherwise use first name
        if(!player.nickname || player.nickname===player.name.split(" ")[0]){
          player.nickname = rawName.split(" ")[0];
        }
      } else if(rawName.includes("@") || !rawName){
        // Google login with no displayName or email as name — keep pre-created data
        // Don't override with empty/email values
      }
      needsSave = true;
    }
  }

  if(player){
    // Update email if missing
    if(!player.email && user.email){ player.email=user.email; needsSave=true; }
  } else {
    // New user — create profile
    let rawName = user.displayName || user.email?.split("@")[0] || "Jogador";
    let realName = rawName;
    let nick = rawName.split(" ")[0];
    if(rawName.includes("|")){
      const parts = rawName.split("|");
      realName = parts[0].trim();
      nick     = parts[1].trim(); // no fallback — must come from signup form
      try{ await updateProfile(user, { displayName: realName }); }catch(e){}
    }
    // Only create if truly new
    if(!DB.players.find(p=>p.uid===user.uid)){
      // If name looks like email or is empty, don't create yet
      // renderProfileSetup will handle it
      if(!realName || realName.includes("@") || realName.length<2){
        realName = "";
        nick     = "";
      }
      player = { uid:user.uid, name:realName, nickname:nick, email:user.email||"", season:ACTIVE_SEASON, needsSetup: !realName };
      DB.players.push(player);
      needsSave = true;
    } else {
      player = DB.players.find(p=>p.uid===user.uid);
    }
  }

  if(needsSave){
    try {
      await savePlayers(); // updateDoc — works for all authenticated users
    } catch(e){ console.warn("Profile save:", e.message); }
  }
  CURRENT_PLAYER = player;
}

// ── FIRESTORE LISTENERS (real-time) ──────────────────────────────────────────
let _unsubListeners = [];
function stopListeners(){ _unsubListeners.forEach(fn=>fn()); _unsubListeners=[]; }

function startListeners(user){
  stopListeners();
  dbg("14. Conectando ao Firestore...");
  // Listen to season document
  const unsub = onSnapshot(
    doc(db,"seasons",ACTIVE_SEASON),
    (snap)=>{
      dbg("15. Firestore snapshot recebido, exists=" + snap.exists());
      if(snap.exists()){
        const data = snap.data();
        DB.players = data.players || [];
        DB.admins  = data.admins  || [];
        // If admin is editing a result, preserve local draft to avoid overwrite
        const editingStageId = resultStage ? resultStage.id : null;
        // If admin has the financial management screen open for a stage,
        // preserve local finance/buyinData so in-progress edits (inputs being
        // typed) aren't wiped out by the snapshot echo of our own save.
        const editingFinanceId = BUYIN_MGMT;
        if(editingStageId || editingFinanceId){
          DB.stages = (data.stages||[]).map(s=>{
            const local = DB.stages.find(x=>x.id===s.id);
            if(s.id===editingStageId && local){
              return {...s, draft: local.draft};
            }
            if(s.id===editingFinanceId && local){
              return {...s, finance: local.finance, buyinData: local.buyinData};
            }
            return s;
          }).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
        } else {
          DB.stages = (data.stages || []).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
        }
        dbg("16. Players=" + DB.players.length + " Stages=" + DB.stages.length);
        // If document exists but is empty, seed it
        if(DB.players.length === 0 && DB.stages.length === 0){
          dbg("17. Documento vazio!");
          setDoc(doc(db,"seasons",ACTIVE_SEASON), {
            players: SEED.players,
            stages:  SEED.stages,
            updatedAt: serverTimestamp()
          }).then(()=>{ dbg("SEED enviado com sucesso!"); })
            .catch(e=>{ dbg("ERRO seed: " + e.message); });
          DB.players = SEED.players;
          DB.stages  = SEED.stages;
        }
      } else {
        dbg("16. Documento 2026 NAO existe! Criando...");
        setDoc(doc(db,"seasons",ACTIVE_SEASON), {
          players: SEED.players,
          stages:  SEED.stages,
          updatedAt: serverTimestamp()
        }).then(()=>{ dbg("17. SEED criado!"); })
          .catch(e=>{ dbg("ERRO ao criar seed: " + e.message); });
        DB.players = SEED.players;
        DB.stages  = SEED.stages;
      }
      // Link user to player after data is loaded
      if(user && DB.players.length > 0){
        ensurePlayerProfile(user).then(()=>{
          IS_ADMIN = ADMIN_EMAILS.includes(user.email) || (DB.admins||[]).includes(user.email) || (DB.admins||[]).includes(user.uid);
          dbg("18. Renderizando app...");
          render();
        });
      } else {
        // Re-apply current player (snapshot may have stale data briefly)
        const freshPlayer = DB.players.find(p=>p.uid===CURRENT_USER_UID);
        CURRENT_PLAYER = freshPlayer || CURRENT_PLAYER;
        dbg("18. Renderizando app...");
        render();
      }
    },
    (err)=>{
      dbg("ERRO Firestore: " + err.code + " - " + err.message);
      // Fallback: render with SEED data
      DB.players = SEED.players;
      DB.stages  = SEED.stages;
      render();
    }
  );
  _unsubListeners.push(unsub);

  // Listen to rules config (non-blocking)
  try {
    const unsubRules = onSnapshot(doc(db,"config","rules"), (snap)=>{
      if(snap.exists()){
        const data = snap.data();
        // Only use if has actual content
        if(data.nlholdem && data.nlholdem.buyin){
          DEFAULT_RULES = data;
        }
      }
    }, (e)=>{ console.warn("Rules listener:", e.message); });
    _unsubListeners.push(unsubRules);
  } catch(e) { console.warn("Rules setup:", e.message); }
}

</script>

// ── ENSURE PLAYER PROFILE ─────────────────────────────────────────────────────
async function ensurePlayerProfile(user){
  let player = DB.players.find(p=>p.uid===user.uid);
  let needsSave = false;

  if(!player){
    // 1. Match by email
    if(user.email){
      player = DB.players.find(p=>p.email && p.email.toLowerCase()===user.email.toLowerCase());
    }

    // 2. Match by displayName (normalize: lowercase, no accents, trim)
    if(!player && user.displayName){
      const norm = s => (s||"").toLowerCase().normalize("NFD")
        .replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9 ]/g,"").trim();
      // Handle "Nome|Apelido" format from signup
      const rawDisplay = user.displayName.includes("|")
        ? user.displayName.split("|")[0].trim()
        : user.displayName;
      const normDisplay = norm(rawDisplay);
      player = DB.players.find(p=>{
        const normName = norm(p.name||"");
        // Full name match
        if(normName === normDisplay) return true;
        // First + last name match (handles "Victor Asdourian" vs "victor asdourian")
        const partsA = normDisplay.split(" ").filter(Boolean);
        const partsB = normName.split(" ").filter(Boolean);
        if(partsA.length>=2 && partsB.length>=2){
          return partsA[0]===partsB[0] && partsA[partsA.length-1]===partsB[partsB.length-1];
        }
        return false;
      });
    }

    if(player){
      // Link Firebase uid — user's own data ALWAYS wins over pre-created seed data
      player.uid   = user.uid;
      player.email = user.email || player.email;

      let rawName = (user.displayName||"").trim();

      if(rawName.includes("|")){
        // Email/password signup: "Nome|Apelido" format
        const parts = rawName.split("|");
        const userN = parts[0].trim();
        const userNick = parts[1].trim();
        if(userN)    player.name     = userN;
        if(userNick) player.nickname = userNick;
        try{ await updateProfile(user,{displayName:userN}); }catch(e){}
      } else if(rawName && !rawName.includes("@")){
        // Google login with real displayName: use it as name
        player.name = rawName;
        // Keep existing nickname if pre-created, otherwise use first name
        if(!player.nickname || player.nickname===player.name.split(" ")[0]){
          player.nickname = rawName.split(" ")[0];
        }
      } else if(rawName.includes("@") || !rawName){
        // Google login with no displayName or email as name — keep pre-created data
        // Don't override with empty/email values
      }
      needsSave = true;
    }
  }

  if(player){
    // Update email if missing
    if(!player.email && user.email){ player.email=user.email; needsSave=true; }
  } else {
    // New user — create profile
    let rawName = user.displayName || user.email?.split("@")[0] || "Jogador";
    let realName = rawName;
    let nick = rawName.split(" ")[0];
    if(rawName.includes("|")){
      const parts = rawName.split("|");
      realName = parts[0].trim();
      nick     = parts[1].trim() || parts[0].split(" ")[0];
      try{ await updateProfile(user, { displayName: realName }); }catch(e){}
    }
    // Only create if truly new
    if(!DB.players.find(p=>p.uid===user.uid)){
      // If name looks like email or is empty, don't create yet
      // renderProfileSetup will handle it
      if(!realName || realName.includes("@") || realName.length<2){
        realName = "";
        nick     = "";
      }
      player = { uid:user.uid, name:realName, nickname:nick, email:user.email||"", season:ACTIVE_SEASON, needsSetup: !realName };
      DB.players.push(player);
      needsSave = true;
    } else {
      player = DB.players.find(p=>p.uid===user.uid);
    }
  }

  if(needsSave){
    try {
      await savePlayers(); // updateDoc — works for all authenticated users
    } catch(e){ console.warn("Profile save:", e.message); }
  }
  CURRENT_PLAYER = player;
}

// ── FIRESTORE LISTENERS (real-time) ──────────────────────────────────────────
let _unsubListeners = [];
function stopListeners(){ _unsubListeners.forEach(fn=>fn()); _unsubListeners=[]; }

function startListeners(user){
  stopListeners();
  dbg("14. Conectando ao Firestore...");
  // Listen to season document
  const unsub = onSnapshot(
    doc(db,"seasons",ACTIVE_SEASON),
    (snap)=>{
      dbg("15. Firestore snapshot recebido, exists=" + snap.exists());
      if(snap.exists()){
        const data = snap.data();
        DB.players = data.players || [];
        DB.admins  = data.admins  || [];
        // If admin is editing a result, preserve local draft to avoid overwrite
        const editingStageId = resultStage ? resultStage.id : null;
        if(editingStageId){
          DB.stages = (data.stages||[]).map(s=>{
            if(s.id===editingStageId){
              const local = DB.stages.find(x=>x.id===editingStageId);
              return local ? {...s, draft: local.draft} : s;
            }
            return s;
          }).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
        } else {
          DB.stages = (data.stages || []).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
        }
        dbg("16. Players=" + DB.players.length + " Stages=" + DB.stages.length);
        // If document exists but is empty, seed it
        if(DB.players.length === 0 && DB.stages.length === 0){
          dbg("17. Documento vazio!");
          setDoc(doc(db,"seasons",ACTIVE_SEASON), {
            players: SEED.players,
            stages:  SEED.stages,
            updatedAt: serverTimestamp()
          }).then(()=>{ dbg("SEED enviado com sucesso!"); })
            .catch(e=>{ dbg("ERRO seed: " + e.message); });
          DB.players = SEED.players;
          DB.stages  = SEED.stages;
        }
      } else {
        dbg("16. Documento 2026 NAO existe! Criando...");
        setDoc(doc(db,"seasons",ACTIVE_SEASON), {
          players: SEED.players,
          stages:  SEED.stages,
          updatedAt: serverTimestamp()
        }).then(()=>{ dbg("17. SEED criado!"); })
          .catch(e=>{ dbg("ERRO ao criar seed: " + e.message); });
        DB.players = SEED.players;
        DB.stages  = SEED.stages;
      }
      // Link user to player after data is loaded
      if(user && DB.players.length > 0){
        ensurePlayerProfile(user).then(()=>{
          IS_ADMIN = ADMIN_EMAILS.includes(user.email) || (DB.admins||[]).includes(user.email) || (DB.admins||[]).includes(user.uid);
          dbg("18. Renderizando app...");
          render();
        });
      } else {
        // Re-apply current player (snapshot may have stale data briefly)
        const freshPlayer = DB.players.find(p=>p.uid===CURRENT_USER_UID);
        CURRENT_PLAYER = freshPlayer || CURRENT_PLAYER;
        dbg("18. Renderizando app...");
        render();
      }
    },
    (err)=>{
      dbg("ERRO Firestore: " + err.code + " - " + err.message);
      // Fallback: render with SEED data
      DB.players = SEED.players;
      DB.stages  = SEED.stages;
      render();
    }
  );
  _unsubListeners.push(unsub);

  // Listen to rules config (non-blocking)
  try {
    const unsubRules = onSnapshot(doc(db,"config","rules"), (snap)=>{
      if(snap.exists()){
        const data = snap.data();
        // Only use if has actual content
        if(data.nlholdem && data.nlholdem.buyin){
          DEFAULT_RULES = data;
        }
      }
    }, (e)=>{ console.warn("Rules listener:", e.message); });
    _unsubListeners.push(unsubRules);
  } catch(e) { console.warn("Rules setup:", e.message); }
}

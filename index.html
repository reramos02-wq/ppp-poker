<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0e0e0e"/>
<meta name="description" content="PPP Poker — Gestão de torneios de poker"/>
<title>PPP Poker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#1a1a1a;--bg-dark:#0e0e0e;--surface:#222;--surface2:#2c2c2c;--border:#333;--border2:#3e3e3e;--yellow:#F5A800;--yl:#FFD166;--gray:#808080;--text:#dedede;--muted:#666;--green:#2ecc71;--red:#e74c3c;--blue:#3498db;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg-dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
#result-modal{position:fixed;inset:0;z-index:999;pointer-events:none;}
#result-modal:not(:empty){pointer-events:all;}
#admin-modal{position:fixed;inset:0;z-index:998;pointer-events:none;}
#admin-modal:not(:empty){pointer-events:all;}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:76px;}

/* HEADER */
.hdr{background:var(--bg-dark);border-bottom:2px solid var(--yellow);padding:10px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.hl{display:flex;align-items:center;gap:10px;}
.hn{font-family:'Barlow Condensed',sans-serif;font-weight:900;line-height:1;}
.hn .p1{color:#fff;font-size:20px;}.hn .p2{color:#808080;font-size:20px;}.hn .p3{color:#F5A800;font-size:20px;}.hn .pk{color:#fff;font-size:14px;letter-spacing:2px;margin-left:4px;}
.hsb{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;}
.hbdg{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;padding:4px 10px;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:2px;}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-dark);border-top:2px solid var(--yellow);display:flex;z-index:200;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;gap:3px;cursor:pointer;border:none;border-top:2px solid transparent;margin-top:-2px;background:none;color:var(--muted);transition:color .15s,border-color .15s;font-family:'Barlow Condensed',sans-serif;}
.nb.on{color:var(--yellow);border-top-color:var(--yellow);}
.ni{font-size:17px;line-height:1;}.nl{font-size:8px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}

/* MORE MENU */
.nb-more{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;gap:3px;cursor:pointer;border:none;border-top:2px solid transparent;margin-top:-2px;background:none;color:var(--muted);transition:color .15s,border-color .15s;font-family:'Barlow Condensed',sans-serif;position:relative;}
.nb-more.on{color:var(--yellow);border-top-color:var(--yellow);}
.nb-more.menu-open{color:var(--yellow);border-top-color:var(--yellow);}
.more-icon{font-size:20px;line-height:1;display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;height:20px;}
.more-icon span{display:block;width:16px;height:2px;background:currentColor;border-radius:1px;transition:all .2s;}
.more-menu{position:fixed;bottom:76px;right:0;left:0;margin:0 auto;max-width:480px;background:var(--surface);border:1px solid var(--border);border-bottom:none;border-radius:10px 10px 0 0;overflow:hidden;z-index:199;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.more-menu.open{transform:translateY(0);pointer-events:all;}
.more-menu-backdrop{position:fixed;inset:0;z-index:198;background:rgba(0,0,0,0);pointer-events:none;transition:background .25s;}
.more-menu-backdrop.open{background:rgba(0,0,0,.5);pointer-events:all;}
.more-menu-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:10px auto 6px;}
.more-menu-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:4px 20px 12px;}
.more-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .15s;border-top:1px solid var(--border);}
.more-item:active{background:var(--surface2);}
.more-item.active-item{background:rgba(245,168,0,.06);}
.more-item-icon{font-size:22px;width:28px;text-align:center;flex-shrink:0;}
.more-item-info{flex:1;}
.more-item-label{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;color:#fff;}
.more-item-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.more-item-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);flex-shrink:0;}
.more-safe{height:env(safe-area-inset-bottom,0px);background:var(--surface);}

/* SECTIONS */
.sec{padding:18px 16px;}
@keyframes fu{from{opacity:0}to{opacity:1}}
.st{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;letter-spacing:1px;color:#fff;text-transform:uppercase;margin-bottom:2px;}
.ac{color:var(--yellow);}
.ss{color:var(--muted);font-size:13px;margin-bottom:14px;}
.dv{width:32px;height:3px;background:var(--yellow);margin-bottom:16px;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px;margin-bottom:10px;}
.cy{border-left:3px solid var(--yellow);}.cg{border-left:3px solid var(--green);}.cr{border-left:3px solid var(--red);}

/* TABS */
.tabs{display:flex;margin-bottom:14px;border:1px solid var(--border);border-radius:2px;overflow:hidden;}
.tb{flex:1;padding:9px 4px;text-align:center;cursor:pointer;border:none;background:var(--surface);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .15s;}
.tb.on{background:var(--yellow);color:#000;}

/* RANK LIST */
.rl{background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.rr{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--border);}
.rr:last-child{border-bottom:none;}
.rpos{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.rp1{color:#FFD700;font-size:22px;}.rp2{color:#C0C0C0;font-size:20px;}.rp3{color:#CD7F32;font-size:18px;}.rpx{color:var(--muted);font-size:14px;}
.av{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--yellow);font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}
.avlg{width:52px;height:52px;font-size:15px;border-width:2px;}
.avxl{width:64px;height:64px;font-size:18px;border:3px solid var(--yellow);}
.ri{flex:1;min-width:0;overflow:visible;}
.rn{font-size:14px;color:#fff;font-weight:600;white-space:nowrap;overflow:visible;}
.rm{font-size:11px;color:var(--muted);margin-top:1px;}
.rv{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--yellow);}
.rvl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* STAGES */
.sgc{background:var(--surface);border:1px solid var(--border);border-radius:3px;margin-bottom:10px;overflow:hidden;}
.sgh{padding:12px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px;}
.sgh:active{background:var(--surface2);}
.sgn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;color:#fff;}
.sgm{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.6;}
.sgr{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.sgb{border-top:1px solid var(--border);padding:12px 13px;}
.badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;padding:3px 8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.bdone{background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.25);}
.bnext{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.25);}
.bfuture{background:rgba(245,168,0,.1);color:var(--yellow);border:1px solid rgba(245,168,0,.25);}
.bfin{background:rgba(52,152,219,.12);color:var(--blue);border:1px solid rgba(52,152,219,.25);}
.resrow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1c1c1c;font-size:13px;}
.resrow:last-child{border-bottom:none;}
.respos{width:22px;text-align:center;color:var(--muted);font-size:11px;font-family:'Barlow Condensed',sans-serif;}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.chip{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px 4px 5px;font-size:12px;color:var(--text);}

/* PLAYERS GRID */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pcrd{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px 12px;text-align:center;cursor:pointer;transition:border-color .15s;}
.pcrd:active{border-color:var(--yellow);}
.pn{font-size:13px;font-weight:600;color:#fff;margin-top:8px;}
.pk2{font-size:12px;color:var(--muted);margin-top:2px;}
.psg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;}
.ps{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:10px 8px;text-align:center;}
.psv{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--yellow);}
.psl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* HOF */
.hfc{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.hfr{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;width:32px;text-align:center;flex-shrink:0;}
.hfn{font-size:15px;color:#fff;font-weight:600;}
.hfb{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.hfbdg{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:3px 8px;border-radius:2px;}
.hby{background:rgba(245,168,0,.15);color:var(--yellow);border:1px solid rgba(245,168,0,.3);}
.hbg{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.25);}

/* POINTS TABLE */
.ptable{width:100%;border-collapse:collapse;font-size:13px;}
.ptable th{background:var(--surface2);color:var(--yellow);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
.ptable td{padding:7px 10px;border-bottom:1px solid #1c1c1c;color:var(--text);}
.ptable tr:last-child td{border-bottom:none;}

/* HERO */
.hero{background:var(--bg-dark);border-bottom:1px solid var(--border);padding:24px 18px 22px;position:relative;overflow:hidden;}
.hero::after{content:'';}
.hppp{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:52px;line-height:1;letter-spacing:6px;margin-bottom:4px;}
.hppp .h1{color:#fff;}.hppp .h2{color:#808080;}.hppp .h3{color:#F5A800;}
.hpsub{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-bottom:18px;}
.hsts{display:flex;gap:10px;}
.hst{flex:1;background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--yellow);padding:10px 8px;text-align:center;border-radius:2px;}
.hsv{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:var(--yellow);}
.hsl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.ov-center{align-items:center;}
.modal{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--yellow);padding:22px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:#fff;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}

/* ADMIN */
.atag{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:1px;}
.urow{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--border);}
.urow:last-child{border-bottom:none;}
.rbdg{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:1px;text-transform:uppercase;}
.rm2{background:rgba(255,215,0,.15);color:#FFD700;border:1px solid rgba(255,215,0,.3);}
.ru{background:rgba(128,128,128,.12);color:var(--muted);border:1px solid rgba(128,128,128,.2);}


/* BUTTONS */
.btn{padding:9px 18px;border-radius:2px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.by{background:var(--yellow);color:#000;}.bo{background:transparent;border:1px solid var(--border2);color:var(--text);}
.bd{background:transparent;border:1px solid rgba(231,76,60,.4);color:var(--red);}
.br{background:var(--red);color:#fff;}
.sm{padding:6px 12px;font-size:12px;}.fw{width:100%;}

/* INPUTS */
.inp{background:var(--surface2);border:1px solid var(--border2);border-radius:2px;color:var(--text);padding:9px 12px;font-family:'Barlow',sans-serif;font-size:14px;width:100%;transition:border-color .15s;}
.inp:focus{outline:none;border-color:var(--yellow);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
select.inp{appearance:none;}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;display:block;font-family:'Barlow Condensed',sans-serif;font-weight:600;}
.fr{margin-bottom:11px;}

/* UTILS */
.row{display:flex;}.btw{display:flex;justify-content:space-between;align-items:center;}
.g8{gap:8px;}.mt16{margin-top:16px;}.mt12{margin-top:12px;}.mt8{margin-top:8px;}
.mb16{margin-bottom:16px;}.mb10{margin-bottom:10px;}
.empty{text-align:center;padding:34px 20px;color:var(--muted);font-size:15px;}
.sep{height:1px;background:var(--border);margin:14px 0;}
.pill{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;letter-spacing:1px;border-radius:2px;}
.py{background:rgba(245,168,0,.15);color:var(--yellow);}
.hidden{display:none!important;}

/* ── RESPONSIVE: TABLET & DESKTOP (≥768px) ── */
@media(min-width:768px){
  body{background:var(--bg);}

  /* Layout shell */
  #app{max-width:100%;padding-bottom:0;display:flex;min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:240px;flex-shrink:0;
    background:var(--bg-dark);
    border-right:2px solid var(--yellow);
    position:fixed;top:0;left:0;bottom:0;
    display:flex;flex-direction:column;
    z-index:200;overflow-y:auto;
  }
  .sb-logo{
    display:flex;align-items:center;gap:10px;
    padding:20px 18px 16px;
    border-bottom:1px solid var(--border);
  }
  .sb-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;line-height:1;}
  .sb-title .p1{color:#fff;font-size:22px;}
  .sb-title .p2{color:#808080;font-size:22px;}
  .sb-title .p3{color:#F5A800;font-size:22px;}
  .sb-title .pk{color:#fff;font-size:15px;letter-spacing:2px;margin-left:4px;}
  .sb-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
  .sb-nav{flex:1;padding:12px 0;}
  .sb-section-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 18px 6px;}
  .sb-item{
    display:flex;align-items:center;gap:12px;
    padding:11px 18px;cursor:pointer;
    border:none;background:none;width:100%;text-align:left;
    color:var(--muted);font-family:'Barlow Condensed',sans-serif;
    font-size:15px;font-weight:700;letter-spacing:.5px;
    transition:all .15s;border-left:3px solid transparent;
  }
  .sb-item:hover{color:var(--text);background:var(--surface);}
  .sb-item.on{color:var(--yellow);background:rgba(245,168,0,.06);border-left-color:var(--yellow);}
  .sb-item-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
  .sb-badge{
    margin-left:auto;background:var(--red);color:#fff;
    font-size:9px;font-weight:700;padding:2px 6px;letter-spacing:1px;text-transform:uppercase;border-radius:2px;
  }
  .sb-footer{
    padding:14px 18px;border-top:1px solid var(--border);
    font-size:11px;color:var(--muted);line-height:1.6;
  }
  .sb-season{
    font-family:'Barlow Condensed',sans-serif;font-size:13px;
    font-weight:700;color:var(--yellow);letter-spacing:1px;
    margin-bottom:2px;
  }

  /* Main content area */
  .main-wrap{
    margin-left:240px;flex:1;
    max-width:960px;
    min-height:100vh;
  }

  /* Top bar (replaces mobile header) */
  .topbar{
    background:var(--bg-dark);border-bottom:1px solid var(--border);
    padding:12px 28px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
  }
  .topbar-title{
    font-family:'Barlow Condensed',sans-serif;font-weight:900;
    font-size:22px;color:#fff;letter-spacing:1px;text-transform:uppercase;
  }
  .topbar-title .ac{color:var(--yellow);}
  .topbar-right{display:flex;align-items:center;gap:10px;}

  /* Content padding */
  .sec{padding:24px 28px;}
  .hero{padding:32px 28px 28px;}

  /* Hide mobile nav, show sidebar */
  .nav{display:none;}
  .more-menu{display:none;}
  .more-menu-backdrop{display:none;}
  .hdr{display:none;}

  /* Home 2-column grid */
  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:24px 28px;}
  .home-col{min-width:0;}

  /* Hero on desktop */
  .hppp{font-size:64px;}
  .hsts{gap:14px;}
  .hst{padding:14px 10px;}
  .hsv{font-size:28px;}

  /* Players grid - more columns */
  .pgrid{grid-template-columns:repeat(3,1fr);}

  /* Wider modal */
  .ov{align-items:center;}
  .modal{max-width:560px;border-radius:6px;max-height:80vh;}

  /* Rank rows hover */
  .rr:hover{background:var(--surface2);cursor:default;}
  .sgh:hover{background:var(--surface2);}
  .pcrd:hover{border-color:var(--yellow);}
}

@media(min-width:1200px){
  .sidebar{width:260px;}
  .main-wrap{margin-left:260px;max-width:1100px;}
  .pgrid{grid-template-columns:repeat(4,1fr);}
}

/* LOGIN SCREEN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg-dark);}
.login-box{width:100%;max-width:420px;}
@media(min-width:768px){
  .login-wrap{background:var(--bg-dark);background-image:radial-gradient(ellipse at 50% 40%, rgba(245,168,0,.06) 0%, transparent 70%);}
  .login-box{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--yellow);border-radius:6px;padding:40px;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
  .login-box .login-logo{margin-bottom:28px;}
  .login-box .login-title{font-size:32px;}
}
.login-logo{text-align:center;margin-bottom:32px;}
.login-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:#fff;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px;text-align:center;}
.login-tabs{display:flex;margin-bottom:20px;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.ltb{flex:1;padding:10px;text-align:center;cursor:pointer;border:none;background:var(--surface);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.ltb.on{background:var(--yellow);color:#000;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:3px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;transition:border-color .15s;}
.google-btn:hover{border-color:var(--yellow);}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--muted);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.forgot{text-align:right;font-size:12px;color:var(--yellow);cursor:pointer;margin-top:-6px;margin-bottom:10px;}
.err-msg{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:var(--red);padding:8px 12px;border-radius:3px;font-size:13px;margin-bottom:10px;}

/* LIVE badge */

// ── LIVE & RANKING MOVEMENT HELPERS ──────────────────────────────────────────
function getLiveStage(){
  // A stage is LIVE if: status=upcoming, date=today, time has been reached
  // Pick the EARLIEST upcoming stage that has passed its start time
  const now = new Date();
  const candidates = [...DB.stages].filter(s=>{
    if(s.status !== "upcoming") return false;
    if(!s.date || !s.time) return false;
    const [y,m,d] = s.date.split("-").map(Number);
    const [h,mi]  = s.time.split(":").map(Number);
    const stageStart = new Date(y, m-1, d, h, mi, 0);
    return now >= stageStart;
  });
  // Sort by date ascending, return the first (most overdue)
  candidates.sort((a,b)=>a.date.localeCompare(b.date));
  return candidates[0] || null;
}

function isLive(stage){
  if(!stage || stage.status !== "upcoming") return false;
  if(!stage.date || !stage.time) return false;
  const now = new Date();
  const [y,m,d] = stage.date.split("-").map(Number);
  const [h,mi]  = stage.time.split(":").map(Number);
  return now >= new Date(y, m-1, d, h, mi, 0);
}

// Always returns the earliest upcoming stage by date — single source of truth
function getNextStage(){
  const live = getLiveStage();
  if(live) return live;
  return DB.stages
    .filter(s=>s.status==="upcoming")
    .sort((a,b)=>(a.date||"").localeCompare(b.date||""))[0] || null;
}

function shouldShowMovement(){
  const now = new Date();
  // Check if there's a live stage
  const live = getLiveStage();
  if(live) return true;
  // Check if last finished stage was recent enough
  const lastFinished = [...DB.stages].filter(s=>s.status==="finished")
    .sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(!lastFinished) return false;
  // Hide 48h BEFORE next upcoming stage (not after)
  const nextStage = [...DB.stages].filter(s=>s.status==="upcoming").sort((a,b)=>a.date.localeCompare(b.date))[0];
  if(nextStage && nextStage.date && nextStage.time){
    const [y,m,d] = nextStage.date.split("-").map(Number);
    const [h,mi]  = nextStage.time.split(":").map(Number);
    const nextStart = new Date(y, m-1, d, h, mi, 0);
    const diffHours = (nextStart - now) / (1000*60*60);
    // Only hide if next stage is in less than 48h AND hasn't started yet
    if(diffHours > 0 && diffHours <= 48) return false;
  }
  return true;
}

function calcRankingMovement(type){
  // Returns map of uid → {prev, curr, delta}
  // Uses the SAME calcRank/calcRankGeral functions the app uses
  // to guarantee consistency with the displayed ranking

  const live = getLiveStage();
  const lastFinished = [...DB.stages]
    .filter(s=>s.status==="finished")
    .sort((a,b)=>b.date.localeCompare(a.date))[0];
  const targetStage = live || lastFinished;
  if(!targetStage) return {};

  const t = type||"geral";

  // Temporarily hide targetStage from DB to calculate "before" ranking
  const savedResults   = targetStage.results;
  const savedStatus    = targetStage.status;
  const savedDraft     = targetStage.draft;

  // ── BEFORE: remove targetStage results ──────────────────────────────────
  targetStage.results = [];
  targetStage.status  = "upcoming"; // hide from finished filter
  targetStage.draft   = null;

  let before;
  if(t==="geral")       before = calcRankGeral();
  else if(t==="nlholdem") before = calcRank("nlholdem");
  else                   before = calcRank("knockout");

  // ── AFTER: restore targetStage ───────────────────────────────────────────
  targetStage.results = savedResults;
  targetStage.status  = savedStatus;
  targetStage.draft   = savedDraft;

  // For live stage, inject draft into results temporarily
  if(live && live.status==="upcoming" && (live.draft||[]).length){
    targetStage.results = (live.draft||[]).map(r=>({
      playerId:r.uid, position:r.pos,
      points:getPts(r.pos), knockouts:r.ko||0
    }));
    targetStage.status = "finished";
  }

  let after;
  if(t==="geral")       after = calcRankGeral();
  else if(t==="nlholdem") after = calcRank("nlholdem");
  else                   after = calcRank("knockout");

  // Restore live stage
  if(live && live.status==="upcoming"){
    targetStage.results = savedResults;
    targetStage.status  = savedStatus;
    targetStage.draft   = savedDraft;
  }

  // Build movement map
  const beforeMap = {};
  before.forEach((r,i)=>{ beforeMap[r.p.uid] = i+1; });

  const movement = {};
  after.forEach((r,i)=>{
    const curr = i+1;
    const prev = beforeMap[r.p.uid] || null;
    // delta > 0 = moved UP (smaller rank number = better position)
    const delta = prev ? prev - curr : 0;
    movement[r.p.uid] = {prev, curr, delta};
  });
  return movement;
}

function movementBadge(uid, type){
  if(!shouldShowMovement()) return "";
  const mv = calcRankingMovement(type||"geral");
  const m = mv[uid];
  if(!m || m.delta===0 || m.prev===null) return "";
  if(m.delta > 0) return `<span style="color:#2ecc71;font-size:9px;font-weight:700;margin-left:3px;white-space:nowrap">▲${m.delta}</span>`;
  return `<span style="color:#e74c3c;font-size:9px;font-weight:700;margin-left:3px;white-space:nowrap">▼${Math.abs(m.delta)}</span>`;
}

// SAFE: reads current Firestore data first to avoid overwriting other players
async function savePlayers(){
  try {
    const snap = await getDoc(doc(db,"seasons",ACTIVE_SEASON));
    if(snap.exists()){
      const current = snap.data();
      // Merge: keep all existing players, only update/add current user's entry
      const existingPlayers = current.players||[];
      const myUid = CURRENT_USER_UID;
      const myPlayer = DB.players.find(p=>p.uid===myUid);
      if(!myPlayer) return;
      const merged = existingPlayers.map(p=>p.uid===myUid?{...p,...myPlayer}:p);
      if(!merged.find(p=>p.uid===myUid)) merged.push(myPlayer);
      await updateDoc(doc(db,"seasons",ACTIVE_SEASON), {
        players: merged,
        updatedAt: serverTimestamp()
      });
      // Update local DB to stay in sync
      DB.players = merged;
    }
  } catch(e){
    console.error("savePlayers error:", e);
  }
}

// ── CALCULATIONS ──────────────────────────────────────────────────────────────
// ── TIEBREAKER ────────────────────────────────────────────────────────────────
// In case of equal points: most 1st places → most 2nd places → ... → most Nth places
function buildPositionCounts(uid, stageFilter){
  const counts = {}; // position → count
  DB.stages.filter(stageFilter).forEach(s=>{
    const r = (s.results||[]).find(x=>x.playerId===uid);
    if(r) counts[r.position] = (counts[r.position]||0) + 1;
  });
  return counts;
}

function tiebreak(a, b, stageFilter){
  // Compare position by position: 1st, 2nd, 3rd, ...
  const maxPos = 20;
  const ca = buildPositionCounts(a.p.uid, stageFilter);
  const cb = buildPositionCounts(b.p.uid, stageFilter);
  for(let pos=1; pos<=maxPos; pos++){
    const diff = (cb[pos]||0) - (ca[pos]||0);
    if(diff !== 0) return diff; // more of this position wins
  }
  return 0; // truly equal
}

function calcRank(type){
  const fin = DB.stages.filter(s=>
    s.status==="finished" && s.type===type && !s.isFinal &&
    (s.season===ACTIVE_SEASON || !s.season)
  );
  const sc = {};
  // Seed with all known players
  DB.players.forEach(p=>{ sc[p.uid]={p,total:0,stages:0,ko:0}; });
  // Also seed from results (catches any UIDs not yet in players list)
  fin.forEach(s=>(s.results||[]).forEach(r=>{
    if(!sc[r.playerId]){
      const p = getPlayer(r.playerId) || {uid:r.playerId, name:r.playerId, nickname:"?"};
      sc[r.playerId] = {p, total:0, stages:0, ko:0};
    }
  }));
  fin.forEach(s=>(s.results||[]).forEach(r=>{
    if(!sc[r.playerId]) return;
    const pts = getPts(r.position);
    sc[r.playerId].total  += pts; // KOs are stats only, not added to ranking points
    sc[r.playerId].stages++;
    sc[r.playerId].ko     += r.knockouts||0;
  }));
  const stageFilter = s =>
    s.status==="finished" && s.type===type && !s.isFinal &&
    (s.season===ACTIVE_SEASON||!s.season);
  return Object.values(sc).filter(s=>s.stages>0).sort((a,b)=>{
    if(b.total !== a.total) return b.total - a.total;
    return tiebreak(a, b, stageFilter);
  });
}

function calcRankGeral(){
  const sc = {};
  // Seed with all known players
  DB.players.forEach(p=>{ sc[p.uid]={p,total:0,stages:0,ko:0,nlPts:0,koPts:0}; });
  const finStages = DB.stages.filter(s=>
    s.status==="finished" && !s.isFinal &&
    (s.season===ACTIVE_SEASON || !s.season)
  );
  // Also seed from results (catches UIDs not in players list)
  finStages.forEach(s=>(s.results||[]).forEach(r=>{
    if(!sc[r.playerId]){
      const p = getPlayer(r.playerId) || {uid:r.playerId, name:r.playerId, nickname:"?"};
      sc[r.playerId] = {p, total:0, stages:0, ko:0, nlPts:0, koPts:0};
    }
  }));
  finStages.forEach(s=>{
    (s.results||[]).forEach(r=>{
      if(!sc[r.playerId]) return;
      const pts = getPts(r.position); // KOs are stats only, not added to points
      sc[r.playerId].total  += pts;
      sc[r.playerId].stages++;
      sc[r.playerId].ko     += r.knockouts||0;
      if(s.type==="nlholdem") sc[r.playerId].nlPts += pts;
      else                    sc[r.playerId].koPts += pts;
    });
  });
  const stageFilterGeral = s =>
    s.status==="finished" && !s.isFinal &&
    (s.season===ACTIVE_SEASON||!s.season);
  return Object.values(sc).filter(s=>s.stages>0).sort((a,b)=>{
    if(b.total !== a.total) return b.total - a.total;
    return tiebreak(a, b, stageFilterGeral);
  });
}

function calcStats(uid){
  let p=0,w=0,wNL=0,wKO=0,wFT=0,ft=0,ko=0;
  DB.stages.filter(s=>s.status==="finished"&&(s.season===ACTIVE_SEASON||!s.season)).forEach(s=>{
    const r=(s.results||[]).find(r=>r.playerId===uid);
    if(!r)return;
    if(!s.isFinal) p++;
    if(r.position<=9) ft++;
    if(r.position===1){
      if(s.isFinal)        wFT++;
      else if(s.type==="nlholdem") wNL++;
      else if(s.type==="knockout") wKO++;
      w++;
    }
    ko+=r.knockouts||0;
  });
  return {p,w,wNL,wKO,wFT,ft,ko};
}

function calcHOF(){
  // Seed from all players AND from results (catches unregistered UIDs)
  const allUids = new Set(DB.players.map(p=>p.uid));
  DB.stages.filter(s=>s.status==="finished").forEach(s=>
    (s.results||[]).forEach(r=>allUids.add(r.playerId))
  );
  return [...allUids].map(uid=>{
    const pl = getPlayer(uid)||{uid,name:uid,nickname:"?"};
    const st = calcStats(uid);
    const wTotal = st.wNL + st.wKO + st.wFT; // all wins
    return {pl,...st,wTotal};
  }).filter(h=>h.wTotal>0||h.wFT>0).sort((a,b)=>b.wTotal-a.wTotal||b.wFT-a.wFT||b.p-a.p);
}

// ── IMAGE UPLOAD HELPERS ──────────────────────────────────────────────────────
// ── CANVAS CROP ENGINE ────────────────────────────────────────────────────────
function openCropModal(file){
  return new Promise((resolve, reject)=>{
    const modal  = document.getElementById("crop-modal");
    const canvas = document.getElementById("crop-canvas");
    const ctx    = canvas.getContext("2d");
    const SIZE   = 300; // display canvas size
    canvas.width = SIZE; canvas.height = SIZE;

    let img, imgW, imgH;
    let scale = 1, minScale = 1;
    let offX = 0, offY = 0;
    let dragging = false, lastX = 0, lastY = 0;
    let lastDist = 0; // for pinch zoom

    function clamp(){
      const w = imgW*scale, h = imgH*scale;
      if(w < SIZE){ offX = (SIZE-w)/2; }
      else { offX = Math.min(0, Math.max(SIZE-w, offX)); }
      if(h < SIZE){ offY = (SIZE-h)/2; }
      else { offY = Math.min(0, Math.max(SIZE-h, offY)); }
    }

    function draw(){
      ctx.clearRect(0,0,SIZE,SIZE);
      ctx.drawImage(img, offX, offY, imgW*scale, imgH*scale);
    }

    const reader = new FileReader();
    reader.onload = e=>{
      img = new Image();
      img.onload = ()=>{
        imgW = img.width; imgH = img.height;
        // Fit so shortest side = SIZE
        minScale = SIZE / Math.min(imgW, imgH);
        scale = minScale;
        offX = (SIZE - imgW*scale)/2;
        offY = (SIZE - imgH*scale)/2;
        clamp(); draw();
        modal.style.display = "flex";
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);

    // Mouse drag
    canvas.onmousedown  = e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; };
    canvas.onmousemove  = e=>{ if(!dragging) return; offX+=e.clientX-lastX; offY+=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY; clamp(); draw(); };
    canvas.onmouseup    = ()=>dragging=false;
    canvas.onmouseleave = ()=>dragging=false;

    // Touch drag + pinch
    canvas.ontouchstart = e=>{
      e.preventDefault();
      if(e.touches.length===1){ dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
      if(e.touches.length===2){ lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }
    };
    canvas.ontouchmove = e=>{
      e.preventDefault();
      if(e.touches.length===1 && dragging){
        offX+=e.touches[0].clientX-lastX; offY+=e.touches[0].clientY-lastY;
        lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
        clamp(); draw();
      }
      if(e.touches.length===2){
        const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        const factor=dist/lastDist;
        const cx=(SIZE/2-offX)/scale, cy=(SIZE/2-offY)/scale;
        scale=Math.max(minScale,Math.min(scale*factor,4));
        offX=SIZE/2-cx*scale; offY=SIZE/2-cy*scale;
        lastDist=dist; clamp(); draw();
      }
    };
    canvas.ontouchend = ()=>dragging=false;

    // Scroll to zoom
    canvas.onwheel = e=>{
      e.preventDefault();
      const factor = e.deltaY<0?1.1:0.9;
      const cx=(SIZE/2-offX)/scale, cy=(SIZE/2-offY)/scale;
      scale=Math.max(minScale,Math.min(scale*factor,4));
      offX=SIZE/2-cx*scale; offY=SIZE/2-cy*scale;
      clamp(); draw();
    };

    const doCancel = ()=>{ modal.style.display="none"; reject(new Error("Cancelado")); };
    document.getElementById("crop-cancel").onclick  = doCancel;
    document.getElementById("crop-cancel2").onclick = doCancel;

    document.getElementById("crop-confirm").onclick = ()=>{
      // Export 400x400
      const out = document.createElement("canvas");
      out.width=400; out.height=400;
      const ratio = 400/SIZE;
      out.getContext("2d").drawImage(img,
        -offX*ratio/scale*scale, -offY*ratio/scale*scale,
        imgW*scale*ratio, imgH*scale*ratio
      );
      // Simpler: just scale the visible canvas area
      const out2 = document.createElement("canvas");
      out2.width=400; out2.height=400;
      out2.getContext("2d").drawImage(canvas,0,0,400,400);
      out2.toBlob(blob=>{ modal.style.display="none"; resolve(blob); },"image/jpeg",0.85);
    };
  });
}

// Upload photo to Firebase Storage, return download URL
async function uploadPhoto(file, path, crop=true){
  let blob;
  if(crop){
    blob = await openCropModal(file);
  } else {
    // For stage photos: just compress without crop
    blob = await new Promise((res,rej)=>{
      const reader = new FileReader();
      reader.onerror = rej;
      reader.onload = e=>{
        const img = new Image();
        img.onerror = rej;
        img.onload = ()=>{
          const maxW = 1200;
          const scale = Math.min(1, maxW/Math.max(img.width,img.height));
          const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
          const cv = document.createElement("canvas");
          cv.width=w; cv.height=h;
          cv.getContext("2d").drawImage(img,0,0,w,h);
          cv.toBlob(b=>b?res(b):rej(new Error("Falhou")), "image/jpeg", 0.80);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }
  const sRef = storageRef(storage, path);
  await uploadBytes(sRef, blob, {contentType:"image/jpeg"});
  return await getDownloadURL(sRef);
}

          ...DB.players[playerIdx],

    {tab:"hof",     icon:"⭐", label:"Hall of Fame"},
    {tab:"players", icon:"👥", label:"Jogadores"},
    {tab:"rules",   icon:"📖", label:"Regras"},
    ...(IS_ADMIN ? [{tab:"admin", icon:"⚙️", label:"Admin"}] : []),
  ];
  return `<aside class="sidebar">
    <div class="sb-logo" data-goto="home" style="cursor:pointer">
      ${LOGO(44)}
      <div>
        <div class="sb-title"><span class="p1">P</span><span class="p2">P</span><span class="p3">P</span> <span class="pk">POKER</span></div>
        ${IS_ADMIN?'<div class="sb-sub">Admin</div>':""}
      </div>
    </div>
    <div class="sb-sep"></div>
    <div class="sb-lbl">Menu</div>
    <nav class="sb-nav">
      ${navItems.map(item=>`<button class="sb-item${TAB===item.tab?" active":""}" data-goto="${item.tab}">
        <span class="sb-icon">${item.icon}</span>
        <span>${item.label}</span>
        ${item.tab==="admin"?`<span class="atag" style="margin-left:auto">ADMIN</span>`:""}
      </button>`).join("")}
    </nav>
    <div style="margin-top:auto;padding:16px 12px;font-size:11px;color:var(--muted)">
      <div style="font-weight:600;color:var(--text)">Temporada ${ACTIVE_SEASON}</div>
      <div>${DB.players.length} jogadores · ${DB.stages.filter(s=>s.status==="finished").length} etapas</div>
    </div>
  </aside>`;
}

function renderTopbar(){
  const pname = CURRENT_PLAYER?.nickname || "Admin";
  const avName = CURRENT_PLAYER?.name || "?";
  return `<div class="topbar">
    <div class="tb-title">${TAB==="home"?"INÍCIO":TAB==="ranking"?"RANKING":TAB==="stages"?"ETAPAS":TAB==="hof"?"HALL OF FAME":TAB==="players"?"JOGADORES":TAB==="rules"?"REGRAS":TAB==="admin"?"ADMIN":""}</div>
    <div style="display:flex;align-items:center;gap:10px">
      ${IS_ADMIN?`<button id="btn-admin-shortcut" data-goto="admin" class="btn by sm" style="font-size:11px;padding:5px 12px">⚙ ADMIN</button>`:""}
      <button id="btn-profile" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0">
        <div style="width:34px;height:34px;border-radius:50%;background:var(--surface2);border:2px solid var(--yellow);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--yellow)">
          ${ini(avName)||"?"}
        </div>
      </button>
    </div>
  </div>`;
}

function renderLoginScreen(){
  const ua = navigator.userAgent||"";
  const isInApp = /FBAN|FBAV|Instagram|WhatsApp|Line\/|MicroMessenger/i.test(ua);
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  return `<div class="login-wrap">
    ${isInApp?`<div style="background:#F5A800;color:#000;padding:14px 16px;text-align:center;font-size:13px;font-weight:700;line-height:1.6;width:100%;box-sizing:border-box">
      ⚠️ Login não funciona neste navegador.<br/>
      <span style="font-weight:400;font-size:12px">Abra o PPP Poker no ${isIOS?"Safari":"Chrome"} para fazer login.<br/>Toque em ··· → "Abrir no ${isIOS?"Safari":"navegador"}"</span>
    </div>`:""}

    <div class="login-box">
      <div class="login-logo" style="text-align:center;margin-bottom:20px">${LOGO(56)}</div>
      <div class="login-title" style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:#fff;text-align:center;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px">PPP POKER</div>
      <div style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px">Temporada ${ACTIVE_SEASON}</div>
      <div class="tabs mb10">
        <button class="tb${LOGIN_TAB==="login"?" on":""}" id="tab-login">Entrar</button>
        <button class="tb${LOGIN_TAB==="signup"?" on":""}" id="tab-signup">Cadastrar</button>
      </div>
      <button class="btn fw" id="btn-google-login" style="background:#fff;color:#333;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.5 33.1 29.8 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.4 6 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-7.7 19.7-20 0-1.3-.1-2.7-.2-4z"/></svg>
        Continuar com Google

      <div style="text-align:center;color:var(--muted);font-size:12px;margin:8px 0">ou</div>
      <div id="login-err"></div>
      ${LOGIN_TAB==="login"?`
        <div class="fr"><label class="lbl">Email</label><input class="inp" id="auth-email" type="email" placeholder="seu@email.com" autocomplete="email"/></div>
        <div class="fr"><label class="lbl">Senha</label><input class="inp" id="auth-pass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
        <div style="text-align:right;margin-bottom:12px"><button id="btn-forgot" style="background:none;border:none;color:var(--yellow);cursor:pointer;font-size:12px">Esqueci minha senha</button></div>
        <button class="btn by fw" id="btn-login" style="padding:14px;font-size:16px">Entrar</button>
      `:`

        <div class="fr"><label class="lbl">Apelido</label><input class="inp" id="auth-nick" placeholder="Joãozinho"/></div>

}

// More menu items (secondary nav)
const MORE_TABS_BASE = [
  {id:"hof",    icon:"🌟", lbl:"Hall of Fame",  sub:"Campeões da temporada"},
  {id:"players",icon:"👥", lbl:"Jogadores",      sub:"Perfis e estatísticas"},
  {id:"rules",  icon:"📖", lbl:"Regras",          sub:"Formatos e pontuação"},
  {id:"admin",  icon:"⚙️", lbl:"Admin",           sub:"Gerenciar o clube"},
];
const MORE_TABS = () => IS_ADMIN ? MORE_TABS_BASE : MORE_TABS_BASE.filter(t=>t.id!=="admin");
const MORE_IDS = () => MORE_TABS_BASE.map(t=>t.id);
// MENU_OPEN declared in global state above

function renderNav(){
  const mainTabs=[
    {id:"home",   icon:"🏠", lbl:"Início"},
    {id:"ranking",icon:"🏆", lbl:"Ranking"},
    {id:"stages", icon:"📅", lbl:"Etapas"},
  ];
  const moreActive = MORE_IDS().includes(TAB);
  return `
  <!-- Backdrop -->
  <div class="more-menu-backdrop${MENU_OPEN?" open":""}" id="menu-backdrop"></div>

  <!-- More menu panel -->
  <div class="more-menu${MENU_OPEN?" open":""}" id="more-menu">
    <div class="more-menu-handle"></div>
    <div class="more-menu-title">Menu</div>
    ${MORE_TABS().map(t=>`
    <div class="more-item${TAB===t.id?" active-item":""}" data-more-tab="${t.id}">
      <span class="more-item-icon">${t.icon}</span>
      <div class="more-item-info">
        <div class="more-item-label">${t.lbl}</div>
        <div class="more-item-sub">${t.sub}</div>
      </div>
      ${TAB===t.id?'<div class="more-item-dot"></div>':""}
    </div>`).join("")}
    <div class="more-safe"></div>
  </div>

  <!-- Nav bar -->
  <nav class="nav">
    ${mainTabs.map(t=>`
    <button class="nb${TAB===t.id?" on":""}" data-tab="${t.id}">
      <span class="ni">${t.icon}</span>
      <span class="nl">${t.lbl}</span>
    </button>`).join("")}
    <button class="nb-more${moreActive?" on":""}${MENU_OPEN?" menu-open":""}" id="btn-more">
      <div class="more-icon">
        <span></span><span></span><span></span>
      </div>
      <span class="nl">${moreActive ? MORE_TABS().find(t=>t.id===TAB)?.lbl.split(" ")[0]||"Mais" : "Mais"}</span>
    </button>
  </nav>`;
}

function renderPage(){
  switch(TAB){
    case "home":    return renderHome();
    case "ranking": return renderRanking();
    case "stages":  return renderStages();
    case "hof":     return renderHOF();
    case "players": return renderPlayers();
    case "rules":   return renderRules();
    case "admin":   return IS_ADMIN?renderAdmin():'<div class="sec"><div class="empty">Acesso restrito.</div></div>';
    default:        return renderHome();
  }
}

// ── HOME DESKTOP (2 colunas) ──────────────────────────────────────────────────
function renderHomeDesktop(){
  const next  = getNextStage();

    <div class="hpsub">Poker · Temporada 2026</div>
    <div class="hsts">
      <div class="hst" data-goto="players" style="cursor:pointer"><div class="hsv">${DB.players.length}</div><div class="hsl">Jogadores</div></div>

    `<div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      ${icon} ${title}<span data-goto="${tab}" style="font-size:10px;color:var(--yellow);cursor:pointer;letter-spacing:1px">Ver tudo →</span>
    </div>`;

  const rrRow = (r,i,sub,type) =>
    `<div class="rr" data-profile="${r.p.uid}" style="cursor:pointer">
      <div class="rpos ${pcls(i)}">${i+1}</div>${AV(r.p.uid)}
      <div class="ri"><div class="rn">${r.p.nickname}${movementBadge(r.p.uid,type||"geral")}</div><div class="rm">${sub}</div></div>
      <div><div class="rv">${r.total}</div><div class="rvl">pts</div></div>
    </div>`;

  // Next stage — full width card

  <div class="card cy mb16" style="cursor:pointer;border-left:4px solid var(--yellow)" data-goto-expand="${next.id}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:20px">
      <div style="flex:1">
        <div style="font-size:10px;color:var(--yellow);text-transform:uppercase;letter-spacing:2px;font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-bottom:6px">📅 Próxima Etapa</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:#fff;line-height:1">${next.name}</div>
          ${isLive(next)?'<span class="live-badge"><span class="live-dot"></span>LIVE RANKING</span>':""}
        </div>
        <div style="font-size:13px;color:var(--muted);margin-top:6px">${fmtD(next.date)}${next.time?" às <b style='color:#fff'>"+next.time+"</b>":""} · ${next.location||"A confirmar"}</div>

      <div style="text-align:right;flex-shrink:0">

        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">inscritos</div>
        <div style="margin-top:10px;font-size:11px;color:var(--yellow);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1.5px">Ver etapa →</div>
      </div>
    </div>

    </div>
  </div>` : "";

  const colNL = `<div class="home-col">
    ${nlTop.length ? secHdr("🃏","Ranking NL Hold'em","ranking")+"<div class='rl'>"+nlTop.map((r,i)=>rrRow(r,i,r.stages+" etapa"+(r.stages!==1?"s":""),"nlholdem")).join("")+"</div>" : ""}
  </div>`;

  const colKO = `<div class="home-col">
    ${koTop.length ? secHdr("🥊","Ranking Knockout","ranking")+"<div class='rl'>"+koTop.map((r,i)=>rrRow(r,i,"🥊 "+r.ko+" KO","knockout")).join("")+"</div>" : ""}
  </div>`;

  // Row 2: Geral + HOF
  const colGeral = `<div class="home-col">
    ${geralTop.length ? secHdr("🏅","Ranking Geral","ranking")+"<div class='rl'>"+geralTop.map((r,i)=>rrRow(r,i,r.stages+" etapa"+(r.stages!==1?"s":""),"geral")).join("")+"</div>" : ""}
  </div>`;

  const colHOF = (()=>{
    const hof = calcHOF().slice(0,5);
    if(!hof.length) return "<div class='home-col'></div>";
    return `<div class="home-col">
      ${secHdr("🌟","Hall of Fame","hof")}
      ${hof.map((h,i)=>{
        const wStages = h.wNL + h.wKO;
        const isFirst = i===0;
        return `<div class="hfc" data-profile="${h.pl.uid}" style="cursor:pointer${isFirst?";border-color:rgba(255,215,0,.3);border-top:2px solid #FFD700":""}">
          <div class="hfr ${pcls(i)}">${i+1}</div>${AV(h.pl.uid,"lg")}
          <div style="flex:1;min-width:0">
            <div class="hfn">${h.pl.nickname}</div>
            <div class="hfb">
              ${h.wNL>0?`<span class="hfbdg hby">🃏 ${h.wNL}</span>`:""}
              ${h.wKO>0?`<span class="hfbdg hby">🥊 ${h.wKO}</span>`:""}
              ${h.wFT>0?`<span class="hfbdg" style="background:rgba(52,152,219,.15);color:#3498db;border:1px solid rgba(52,152,219,.3)">🏆 FT ${h.wFT}</span>`:""}
              <span class="hfbdg hbg">▶ ${h.p}</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--yellow);line-height:1">${h.wTotal}</div>
            <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px">vitória${h.wTotal!==1?"s":""}</div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
  })();

  return `<div>
    ${heroHtml}
    ${heroCard}
    <div class="home-grid" style="margin-bottom:16px">${colNL}${colKO}</div>
    <div class="home-grid">${colGeral}${colHOF}</div>
  </div>`;
}

  const next = getNextStage();

  const geralTop = calcRankGeral().slice(0,3);
  const nlTop = calcRank("nlholdem").slice(0,3);
  const koTop = calcRank("knockout").slice(0,3);

// ── RANKING ───────────────────────────────────────────────────────────────────
function renderRanking(){
  const list = RANK_TAB==="geral"?calcRankGeral():calcRank(RANK_TAB);
  const isKO = RANK_TAB==="knockout";
  const isGeral = RANK_TAB==="geral";
  return `<div class="sec">
  <div class="st">Rank<span class="ac">ing</span></div><div class="ss">Temporada 2026</div><div class="dv"></div>
  <div class="tabs">
    <button class="tb${RANK_TAB==="geral"?" on":""}" data-rtab="geral">🏅 Geral</button>
    <button class="tb${RANK_TAB==="nlholdem"?" on":""}" data-rtab="nlholdem">🃏 NL Hold'em</button>
    <button class="tb${RANK_TAB==="knockout"?" on":""}" data-rtab="knockout">🥊 Knockout</button>
  </div>
  ${list.length===0?'<div class="empty">Nenhum resultado registrado.</div>':''}
  <div class="rl">${list.map((r,i)=>{
    const inFTZone = i < 9;
    const isNinth = i === 8;
    const rowStyle = inFTZone
      ? `cursor:pointer;background:rgba(245,168,0,.04);border-left:3px solid rgba(245,168,0,.35);`
      : `cursor:pointer;`;
    const cutLine = isNinth
      ? `<div style="height:2px;background:linear-gradient(90deg,rgba(245,168,0,.6),rgba(245,168,0,.15),transparent);margin:0 -1px;"></div>`
      : "";
    return `<div class="rr" data-profile="${r.p.uid}" style="${rowStyle}">
    <div class="rpos ${pcls(i)}">${i+1}</div>${AV(r.p.uid)}
    <div class="ri">
      <div class="rn">${r.p.nickname}${movementBadge(r.p.uid,RANK_TAB)}${inFTZone?` <span style="font-size:9px;color:rgba(245,168,0,.6);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px">FT</span>`:""}
      </div>
      <div class="rm">${r.stages} etapa${r.stages!==1?"s":""}${isKO?` · 🥊 ${r.ko}`:""}${isGeral&&r.ko>0?` · 🥊 ${r.ko}`:""}${isGeral?` <span style="font-size:10px;color:var(--muted)">(🃏${r.nlPts} + 🥊${r.koPts})</span>`:""}</div>
    </div>
    <div><div class="rv">${r.total}</div><div class="rvl">pts</div></div>
  </div>${cutLine}`;
  }).join("")}</div>
  ${list.length>=9?`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(245,168,0,.06);border:1px solid rgba(245,168,0,.15);border-radius:0 0 3px 3px;margin-top:-1px"><span style="font-size:12px">🏆</span><span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(245,168,0,.7);text-transform:uppercase">Zona de classificação — Mesa Final</span></div>`:""}
  </div>`;
}

// ── STAGES ────────────────────────────────────────────────────────────────────
function renderStages(){
  if(STAGE_DETAIL) return renderStageDetail(STAGE_DETAIL);
  const upcoming = DB.stages.filter(s=>s.status==="upcoming").sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const nextId = getNextStage()?.id || null;
  return `<div class="sec">
  <div class="st">Eta<span class="ac">pas</span></div><div class="ss">Calendário da temporada</div><div class="dv"></div>
  ${DB.stages.length===0?'<div class="empty">Nenhuma etapa cadastrada.</div>':''}
  ${DB.stages.map(s=>{
    const ins  = s.inscriptions||[];
    const isNext = s.id===nextId && s.status==="upcoming";
    const badgeCls = s.isFinal?"bfin":s.status==="finished"?"bdone":isNext?"bnext":"bfuture";
    const badgeLbl = s.isFinal?"🏆 Final":s.status==="finished"?"Encerrada":isNext?"Próxima":"Futura";
    return `<div class="sgc" data-detail="${s.id}" style="cursor:pointer">
      <div class="sgh" style="pointer-events:none">
        <div style="flex:1">

          <span class="badge ${badgeCls}">${badgeLbl}</span>
          <span style="color:var(--muted);font-size:18px">›</span>
        </div>
      </div>
    </div>`;
  }).join("")}
  </div>`;
}

    })()}

}

// ── HOF ───────────────────────────────────────────────────────────────────────
function renderHOF(){
  const all = calcHOF();

  // Apply filter
  let filtered;
  if(HOF_FILTER==="ft"){
    filtered = all.filter(h=>h.wFT>0).sort((a,b)=>b.wFT-a.wFT||b.wTotal-a.wTotal);
  } else if(HOF_FILTER==="stages"){
    filtered = all.filter(h=>(h.wNL+h.wKO)>0).sort((a,b)=>(b.wNL+b.wKO)-(a.wNL+a.wKO)||b.wTotal-a.wTotal);
  } else {
    // total: all wins combined
    filtered = all.sort((a,b)=>b.wTotal-a.wTotal||b.wFT-a.wFT);
  }

  const tabs = [
    {id:"total",  icon:"🏅", label:"Total"},
    {id:"stages", icon:"🃏", label:"Etapas"},
    {id:"ft",     icon:"🏆", label:"Mesa Final"},
  ];

  return `<div class="sec">
  <div class="st">Hall of <span class="ac">Fame</span></div>
  <div class="ss">Campeões da Temporada ${ACTIVE_SEASON}</div>
  <div class="dv"></div>

  <div class="tabs" style="margin-bottom:16px">
    ${tabs.map(t=>`<button class="tb${HOF_FILTER===t.id?" on":""}" data-hof-tab="${t.id}">
      ${t.icon} ${t.label}
    </button>`).join("")}
  </div>

  ${filtered.length===0?`<div class="empty">Nenhuma vitória ${HOF_FILTER==="ft"?"em Mesa Final":HOF_FILTER==="stages"?"em etapas":""} ainda.</div>`:""}

  ${filtered.map((h,i)=>{
    const wStages = h.wNL + h.wKO;
    const isFirst = i===0;

    // What to show based on filter
    let statMain="", statSub="";
    if(HOF_FILTER==="ft"){
      statMain = `${h.wFT}`;
      statSub = `vitória${h.wFT!==1?"s":""} FT`;
    } else if(HOF_FILTER==="stages"){
      statMain = `${wStages}`;
      statSub = `vitória${wStages!==1?"s":""} etapa`;
    } else {
      statMain = `${h.wTotal}`;
      statSub = `vitória${h.wTotal!==1?"s":""}`;
    }

    return `<div class="hfc" data-profile="${h.pl.uid}" style="cursor:pointer${isFirst?";border-color:rgba(255,215,0,.4);border-top:2px solid #FFD700":""}">
      <div class="hfr ${pcls(i)}">${i+1}</div>
      ${AV(h.pl.uid,"lg")}
      <div style="flex:1;min-width:0">
        <div class="hfn">${h.pl.name} <span style="color:var(--muted);font-size:13px;font-weight:400">"${h.pl.nickname}"</span></div>
        <div class="hfb">
          ${h.wNL>0?`<span class="hfbdg hby">🃏 ${h.wNL}</span>`:""}
          ${h.wKO>0?`<span class="hfbdg hby">🥊 ${h.wKO}</span>`:""}
          ${h.wFT>0?`<span class="hfbdg" style="background:rgba(52,152,219,.15);color:#3498db;border:1px solid rgba(52,152,219,.3)">🏆 FT ${h.wFT}</span>`:""}
          <span class="hfbdg hbg">▶ ${h.p} etapa${h.p!==1?"s":""}</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:var(--yellow);line-height:1">${statMain}</div>
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px">${statSub}</div>
      </div>
    </div>`;
  }).join("")}
  </div>`;
}

// ── PLAYERS ───────────────────────────────────────────────────────────────────
function isValidPlayerName(name){
  // Filter out obvious username/email accounts (no spaces, all lowercase, has special chars)
  if(!name) return false;
  const n = name.trim();

        PENDING_REMOVALS.delete(uid);
        row.style.opacity="1";
        if(nameEl) nameEl.style.textDecoration="none";
        btn.textContent="✕ Remover";
        btn.style.background="";
      } else {
        PENDING_REMOVALS.add(uid);
        row.style.opacity="0.45";
        if(nameEl) nameEl.style.textDecoration="line-through";
        btn.textContent="↺ Desfazer";
        btn.style.background="rgba(231,76,60,.2)";
      }
      updatePendingBar();
    });
  });

  // Add player
  document.querySelectorAll("[data-add-ins]").forEach(btn=>{
    btn.addEventListener("click", async()=>{
      const uid = btn.dataset.addIns;
      const s = DB.stages.find(x=>x.id===sid);
      if(!s) return;
      const newIns = [...new Set([...(s.inscriptions||[]), uid])];
      btn.disabled=true; btn.textContent="...";
      try {
        await updateDoc(doc(db,"seasons",ACTIVE_SEASON),{
          stages: DB.stages.map(x=>x.id===sid?{...x,inscriptions:newIns}:x),
          updatedAt: serverTimestamp()
        });
        const ls = DB.stages.find(x=>x.id===sid);
        if(ls) ls.inscriptions=newIns;
        showToast("Inscrito adicionado ✓","green");
        el?.remove();
        STAGE_DETAIL=sid; TAB="stages"; render();
        setTimeout(()=>window.openManageIns(sid),200);
      } catch(err){ showToast("Erro: "+err.message,"red"); btn.disabled=false; btn.textContent=getP(uid)?.nickname||uid; }
    });
  });

  // Undo all
  document.getElementById("manage-ins-undo")?.addEventListener("click",()=>{
    PENDING_REMOVALS=new Set();
    document.querySelectorAll("[data-remove-ins]").forEach(btn=>{
      const uid=btn.dataset.removeIns;
      const row=document.getElementById(`manage-row-${uid}`);
      const nameEl=document.getElementById(`manage-name-${uid}`);
      row.style.opacity="1";
      if(nameEl) nameEl.style.textDecoration="none";
      btn.textContent="✕ Remover"; btn.style.background="";
    });
    updatePendingBar();
  });

  // Confirm removals
  document.getElementById("manage-ins-save")?.addEventListener("click", async()=>{
    if(PENDING_REMOVALS.size===0) return;
    const s = DB.stages.find(x=>x.id===sid);
    if(!s) return;
    const saveBtn = document.getElementById("manage-ins-save");
    saveBtn.disabled=true; saveBtn.textContent="Salvando...";
    const newIns = (s.inscriptions||[]).filter(uid=>!PENDING_REMOVALS.has(uid));
    try {
      await updateDoc(doc(db,"seasons",ACTIVE_SEASON),{
        stages: DB.stages.map(x=>x.id===sid?{...x,inscriptions:newIns}:x),
        updatedAt: serverTimestamp()
      });
      const ls=DB.stages.find(x=>x.id===sid);
      if(ls) ls.inscriptions=newIns;
      showToast(`${PENDING_REMOVALS.size} inscrito(s) removido(s) ✓`,"green");
      PENDING_REMOVALS=new Set();
      el?.remove();
      STAGE_DETAIL=sid; TAB="stages"; render();
    } catch(err){ showToast("Erro: "+err.message,"red"); saveBtn.disabled=false; saveBtn.textContent="💾 Confirmar"; }
  });
}

function updatePendingBar(){
  const bar=document.getElementById("manage-ins-pending");
  const txt=document.getElementById("manage-pending-txt");
  if(!bar) return;
  if(PENDING_REMOVALS.size>0){
    bar.style.display="block";
    const names=[...PENDING_REMOVALS].map(uid=>getP(uid)?.nickname||uid).join(", ");
    txt.textContent=`Marcado para remover: ${names}`;
  } else {
    bar.style.display="none";
  }
}

      <div class="ps" style="${uidDupes.length>0?"border-color:var(--red)":""}"><div class="psv" style="${uidDupes.length>0?"color:var(--red)":""}">${uidDupes.length}</div><div class="psl">UIDs duplicados</div></div>
      <div class="ps"><div class="psv">${mocks.length}</div><div class="psl">Sem conta (p_*)</div></div>
    </div>

    ${ghosts.length>0?`
    <div class="card" style="border-left:3px solid var(--red);margin-bottom:10px">
      <div style="font-weight:700;color:var(--red);margin-bottom:8px">❌ UIDs Fantasma (${ghosts.length})</div>
      ${ghosts.map(uid=>{
        const inStages=stages.filter(s=>(s.results||[]).find(r=>r.playerId===uid)).map(s=>s.name);
        return `<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">

          <div style="color:var(--muted)">em: ${inStages.join(", ")}</div>

    ${uidDupes.length>0?`
    <div class="card" style="border-left:3px solid var(--red);margin-bottom:10px">
      <div style="font-weight:700;color:var(--red);margin-bottom:8px">⚠ UIDs Duplicados (${uidDupes.length})</div>
      ${uidDupes.map(([uid,list])=>`
        <div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">
          <div style="font-size:10px;color:var(--muted);font-family:monospace">${uid}</div>

        </div>`).join("")}
      <button class="btn by sm mt8" id="btn-fix-dupes-audit">🧹 Limpar duplicatas agora</button>
    </div>`:""}

    ${dupes.length>0?`
    <div class="card" style="border-left:3px solid var(--yellow);margin-bottom:10px">
      <div style="font-weight:700;color:var(--yellow);margin-bottom:8px">⚠ Nomes Duplicados (${dupes.length})</div>

function toolsLog(msg, cls=""){
  const el = document.getElementById("tools-log");
  if(!el) return;
  el.style.display = "block";
  const color = cls==="ok"?"#2ecc71":cls==="err"?"#e74c3c":cls==="warn"?"#F5A800":"#aaa";
  el.innerHTML += `<div style="color:${color}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function runFixDupes(){
  const snap = await getDoc(doc(db,"seasons",ACTIVE_SEASON));
  const data = snap.data();
  let players = [...(data.players||[])];
  const stages = data.stages||[];
  const admins = data.admins||[];
  const before = players.length;
  const seen=new Map();
  const cleaned=[];
  players.forEach(p=>{
    if(!seen.has(p.uid)){
      seen.set(p.uid,cleaned.length);
      cleaned.push({...p});
    } else {
      const idx=seen.get(p.uid);
      const existing=cleaned[idx];
      const pIsUser = p.email && p.nickname && p.nickname!==p.name.split(" ")[0];
      const eIsUser = existing.email && existing.nickname && existing.nickname!==existing.name.split(" ")[0];
      if(pIsUser && !eIsUser){ cleaned[idx]={...p}; toolsLog(`🔄 Preferindo: "${p.name}"`, "ok"); }
      else { toolsLog(`🗑️ Removido: "${p.name}"`, "warn"); }
    }
  });
  await setDoc(doc(db,"seasons",ACTIVE_SEASON),{players:cleaned,stages,admins,updatedAt:serverTimestamp()});
  DB.players=cleaned;
  toolsLog(`✅ ${before} → ${cleaned.length} jogadores (${before-cleaned.length} removidos)`, "ok");
}

// ── RESULT MODAL ──────────────────────────────────────────────────────────────
let autoSaveTimer = null;

function openResultModal(sid){
  var stage=DB.stages.find(function(s){return s.id===sid;});
  if(!stage)return;
  resultStage=stage;
  var draft=stage.draft||[];
  var results=stage.results||[];
  var base=(stage.inscriptions||[]).map(function(uid){
    var dr=draft.find(function(r){return r.uid===uid;});
    var ex=results.find(function(r){return r.playerId===uid;});
    if(dr) return {uid:uid, pos:dr.pos||"", ko:dr.ko||"0"};
    if(ex) return {uid:uid, pos:String(ex.position), ko:String(ex.knockouts||0)};
    return {uid:uid, pos:"", ko:"0"};
  });
  results.forEach(function(r){
    if(!base.find(function(x){return x.uid===r.playerId;}))
      base.push({uid:r.playerId, pos:String(r.position), ko:String(r.knockouts||0)});
  });
  resultRows=base;
  drawResultModal();
}

function autoSaveDraft(){
  if(!resultStage)return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(function(){
    DB.stages=DB.stages.map(function(s){
      if(s.id!==resultStage.id)return s;
      return Object.assign({},s,{draft:resultRows.map(function(r){return {uid:r.uid,pos:r.pos,ko:r.ko};})});
    });
    save();
    var ind=document.getElementById("autosave-ind");
    if(ind){ind.textContent="✓ Salvo";ind.style.color="var(--green)";}
    setTimeout(function(){var ind=document.getElementById("autosave-ind");if(ind)ind.textContent="";},2000);
  },800);
}

  document.getElementById("admin-modal").innerHTML=`
  <div class="ov" id="pm-ov">

      <div class="mtitle">Novo Jogador</div>
      <div class="fr"><label class="lbl">Nome completo</label><input class="inp" id="pf-n" placeholder="Ex: João da Silva"/></div>

    save();closeAdminModal();render();
  });
}

// Export podium as image
window.exportPodium = async function(){
  const el = document.getElementById("podium-export");
  if(!el){ showToast("Pódio não encontrado","red"); return; }
  try {
    // Load html2canvas if not loaded
    if(!window.html2canvas){
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload=res; s.onerror=rej;
        document.head.appendChild(s);
      });
    }
    showToast("Gerando imagem...","green");
    const canvas = await html2canvas(el, {
      backgroundColor:"#1a1a1a",
      scale:2,
      useCORS:true,
      logging:false
    });
    const link = document.createElement("a");
    link.download = "podium-ppp-poker.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    showToast("Imagem salva!","green");
  } catch(e){
    showToast("Erro ao exportar: "+e.message,"red");
  }
};

function bindProfileSetup(){
  document.getElementById("btn-setup-save")?.addEventListener("click", async()=>{
    const name = document.getElementById("setup-name")?.value.trim();
    const nick = document.getElementById("setup-nick")?.value.trim();
    const errEl = document.getElementById("setup-err");

    if(!name || name.length < 2){
      errEl.innerHTML = '<div class="err-msg">Nome completo é obrigatório (mínimo 2 caracteres).</div>';
      return;
    }
    if(!nick || nick.length < 2){
      errEl.innerHTML = '<div class="err-msg">Apelido é obrigatório (mínimo 2 caracteres).</div>';
      return;
    }

    const btn = document.getElementById("btn-setup-save");
    btn.disabled = true;
    btn.textContent = "Salvando...";

    try {
      // Update Firebase Auth
      await updateProfile(CURRENT_USER, { displayName: name });

      // Update player in DB
      const idx = DB.players.findIndex(p=>p.uid===CURRENT_USER_UID);
      if(idx>=0){
        DB.players[idx] = {...DB.players[idx], name, nickname:nick, needsSetup:false};
        CURRENT_PLAYER = DB.players[idx];
      } else {
        const p = {uid:CURRENT_USER_UID, name, nickname:nick, email:CURRENT_USER.email||"", season:ACTIVE_SEASON, needsSetup:false};
        DB.players.push(p);
        CURRENT_PLAYER = p;
      }
      await savePlayers();
      render();
    } catch(e){
      errEl.innerHTML = `<div class="err-msg">Erro: ${e.message}</div>`;
      btn.disabled = false;
      btn.textContent = "✓ Entrar no PPP Poker";
    }
  });

  // Enter key on nick field
  document.getElementById("setup-nick")?.addEventListener("keydown", e=>{
    if(e.key==="Enter") document.getElementById("btn-setup-save")?.click();
  });

  // Auto-fill nick from name
  document.getElementById("setup-name")?.addEventListener("blur", function(){
    const nickEl = document.getElementById("setup-nick");
    if(nickEl && !nickEl.value && this.value){
      nickEl.value = this.value.trim().split(" ")[0];
    }
  });

  document.getElementById("setup-logout")?.addEventListener("click", async()=>{
    stopListeners();
    await signOut(auth);
  });
}

function bindLoginEvents(){
  // Google login
  document.getElementById("btn-google-login")?.addEventListener("click", async()=>{
    try{
      const provider = new GoogleAuthProvider();
      await signInWithPopup(auth, provider);
    }catch(e){ showLoginError(e.code); }
  });

  // Tab switching
  document.getElementById("tab-login")?.addEventListener("click",()=>{ LOGIN_TAB="login"; document.getElementById("app").innerHTML=renderLoginScreen(); bindLoginEvents(); });
  document.getElementById("tab-signup")?.addEventListener("click",()=>{ LOGIN_TAB="signup"; document.getElementById("app").innerHTML=renderLoginScreen(); bindLoginEvents(); });

  // Login
  document.getElementById("btn-login")?.addEventListener("click", async()=>{
    const email = document.getElementById("auth-email")?.value.trim();
    const pass  = document.getElementById("auth-pass")?.value;
    if(!email||!pass){ showLoginError("auth/missing-fields"); return; }
    try{
      await signInWithEmailAndPassword(auth, email, pass);
    }catch(e){ showLoginError(e.code); }
  });

  // Enter key on password
  document.getElementById("auth-pass")?.addEventListener("keydown", e=>{
    if(e.key==="Enter") document.getElementById("btn-login")?.click();
  });

  // Signup
  document.getElementById("btn-signup")?.addEventListener("click", async()=>{
    const name  = document.getElementById("auth-name")?.value.trim();
    const nick  = document.getElementById("auth-nick")?.value.trim() || (name?name.split(" ")[0]:"");
    const email = document.getElementById("auth-email")?.value.trim();
    const pass  = document.getElementById("auth-pass")?.value;
    if(!name||!email||!pass){ showLoginError("auth/missing-fields"); return; }
    try{
      const btn = document.getElementById("btn-signup");
      if(btn){ btn.disabled=true; btn.textContent="Criando conta..."; }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name+"|"+nick });
    }catch(e){
      showLoginError(e.code);
      const btn = document.getElementById("btn-signup");
      if(btn){ btn.disabled=false; btn.textContent="Criar conta"; }
    }
  });

  // Forgot password
  document.getElementById("btn-forgot")?.addEventListener("click", async()=>{
    const email = document.getElementById("auth-email")?.value.trim();
    if(!email){ showLoginError("auth/missing-email"); return; }
    try{
      await sendPasswordResetEmail(auth, email);
      showLoginError("auth/reset-sent");
    }catch(e){ showLoginError(e.code); }
  });
}

    if(p){ DIAGNOSE_EDIT_UID=uid; showDiagnoseEditModal(p); }
  };
  window.navToolsBack = function(){ TOOLS_VIEW="home"; DIAGNOSE_EDIT_UID=null; render(); };

  window.saveDiagnoseEdit = async function(uidB64){
    const oldUid = decodeURIComponent(escape(atob(uidB64)));
    const newName  = document.getElementById("new-name")?.value.trim();
    const newNick  = document.getElementById("new-nick")?.value.trim();
    const newEmail = document.getElementById("new-email")?.value.trim();
    const newUid   = document.getElementById("new-uid")?.value.trim();
    const msgEl    = document.getElementById("dedit-msg");

    // Get current player to use as fallback
    const cur = DB.players.find(p=>p.uid===oldUid)||{};
    const finalName  = newName  || cur.name     || "";
    const finalNick  = newNick  || cur.nickname || "";
    const finalEmail = newEmail || cur.email    || "";
    const finalUid   = (newUid && newUid.length>5) ? newUid : oldUid;

    if(!finalName){
      if(msgEl) msgEl.innerHTML='<div class="err-msg">Nome não pode ficar vazio.</div>';
      return;
    }

    if(msgEl) msgEl.innerHTML='<div style="color:var(--yellow);font-size:12px">Salvando...</div>';

    try {
      const snap  = await getDoc(doc(db,"seasons",ACTIVE_SEASON));
      const data  = snap.data();
      let players = [...(data.players||[])];
      let stages  = [...(data.stages||[])];
      const admins= data.admins||[];

      // Update or create player entry
      const pidx = players.findIndex(p=>p.uid===oldUid);
      const updated = {uid:finalUid, name:finalName, nickname:finalNick, email:finalEmail, season:ACTIVE_SEASON};
      if(pidx>=0){ players[pidx]={...players[pidx],...updated}; }
      else { players.push(updated); }

      // Update stages if UID changed
      if(finalUid !== oldUid){
        let stFixed=0;
        stages = stages.map(s=>{
          let mod=false;
          const results=(s.results||[]).map(r=>{ if(r.playerId===oldUid){mod=true;return{...r,playerId:finalUid};} return r;});
          const ins=(s.inscriptions||[]).map(u=>{ if(u===oldUid){mod=true;return finalUid;} return u;});
          if(mod){stFixed++;return{...s,results,inscriptions:ins};}
          return s;
        });
        /* stages updated */
      }

      // Dedup
      const seen=new Set();
      players=players.filter(p=>{ if(seen.has(p.uid))return false; seen.add(p.uid);return true; });

      await setDoc(doc(db,"seasons",ACTIVE_SEASON),{players,stages,admins,updatedAt:serverTimestamp()});
      DB.players=players; DB.stages=stages;
      DIAGNOSE_EDIT_UID=null;
      TOOLS_VIEW="diagnose";
      const _m=document.getElementById("result-modal"); if(_m) _m.innerHTML="";
      showToast("✅ Jogador atualizado!","green");
      render();
    } catch(e){
      if(msgEl) msgEl.innerHTML=`<div class="err-msg">Erro: ${e.message}</div>`;
    }
  };

    const allUids=new Set(); stages.forEach(s=>(s.results||[]).forEach(r=>allUids.add(r.playerId)));
    const pUids=new Set(players.map(p=>p.uid));
    const report={
      summary:{totalPlayers:players.length,totalStages:stages.length,linkedPlayers:players.filter(p=>p.email&&p.email.trim()!=="").length,unlinkedPlayers:players.filter(p=>!p.email||p.email.trim()==="").length,mockUids:players.filter(p=>p.uid.startsWith("p_")).length},

    };
    const nm={}; players.forEach(p=>{const k=(p.name||"").toLowerCase().trim();if(!nm[k])nm[k]=[];nm[k].push(p);}); 
    report.duplicates=Object.entries(nm).filter(([k,v])=>v.length>1).map(([name,list])=>({name,entries:list.map(p=>({uid:p.uid,email:p.email||"",isMock:p.uid.startsWith("p_")}))}));

      setTimeout(()=>{
        const adminBtn = document.getElementById("btn-add-player");
        if(adminBtn && TAB==="admin") adminBtn.click();
      }, 150);
    } else {
      // Already in admin players tab — handled below by existing listener
    }
  });

  // Stage photo upload (admin only)
  document.querySelectorAll("input[data-photo-type]").forEach(inp=>{
    inp.addEventListener("change", async(e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const photoType = inp.dataset.photoType; // photoChampion or photoFinalTable
      const sid = inp.dataset.stageId;
      const statusEl = document.getElementById(`stage-photo-status-${sid}`);
      if(statusEl) statusEl.textContent = "⏳ Enviando foto...";
      try {
        const path = `stages/${sid}/${photoType}.jpg`;
        const url = await uploadPhoto(file, path, false);
        const newStages = DB.stages.map(s=>{
          if(s.id===sid) return {...s, [photoType]:url};
          return s;
        });
        await updateDoc(doc(db,"seasons",ACTIVE_SEASON),{
          stages: newStages,
          updatedAt: serverTimestamp()
        });
        DB.stages = newStages;
        if(statusEl) statusEl.textContent = "✅ Foto salva!";
        STAGE_DETAIL = sid;
        TAB = "stages";
        setTimeout(()=>render(), 500);
      } catch(err) {
        if(statusEl) statusEl.textContent = "❌ Erro: "+err.message;
        console.error(err);
      }
    });
  });

  // Late checkbox
  document.querySelectorAll("[data-late]").forEach(chk=>{
    chk.addEventListener("change", async()=>{
      const sid = chk.dataset.late;
      const stage = DB.stages.find(s=>s.id===sid);
      if(!stage) return;
      const lateList = [...(stage.lateList||[])];
      const isLate = chk.checked;
      const newLate = isLate
        ? [...new Set([...lateList, CURRENT_USER_UID])]
        : lateList.filter(u=>u!==CURRENT_USER_UID);
      try {
        await updateDoc(doc(db,"seasons",ACTIVE_SEASON),{
          stages: DB.stages.map(s=>s.id===sid?{...s,lateList:newLate}:s),
          updatedAt: serverTimestamp()
        });
        const localStage = DB.stages.find(s=>s.id===sid);
        if(localStage) localStage.lateList = newLate;
      } catch(err){
        chk.checked = !isLate; // revert checkbox on failure
        showToast("Erro ao salvar Late. Tente novamente.","red");
        return;
      }
      // Keep current stage detail view after late toggle
      STAGE_DETAIL = sid;
      TAB = "stages";
      showToast(isLate?"⏳ Marcado como Late":"Late removido","green");
      render();
    });
  });

  // HOF filter tabs
  document.querySelectorAll("[data-hof-tab]").forEach(btn=>{
    btn.addEventListener("click",()=>{ HOF_FILTER=btn.dataset.hofTab; render(); });
  });

  // Add player button (admin players tab)
  document.getElementById("btn-add-player")?.addEventListener("click", ()=>openPlayerModal());

  // Toggle admin
  document.querySelectorAll("[data-toggle-admin]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const uid = btn.dataset.toggleAdmin;
      const player = DB.players.find(p=>p.uid===uid);
      if(!player) return;
      const email = player.email||"";
      if(!email){ showToast("Jogador sem email cadastrado — peça para ele fazer login primeiro.","red"); return; }
      DB.admins = DB.admins || [...ADMIN_EMAILS];
      // Support both uid and email in admins list
      const isAdmByEmail = email && DB.admins.includes(email);
      const isAdmByUid   = DB.admins.includes(uid);
      const isAdm = isAdmByEmail || isAdmByUid;
      if(isAdm){
        DB.admins = DB.admins.filter(e=>e!==email && e!==uid);
        showToast(player.nickname+" removido como admin.","green");
      } else {
        // Store UID (works even without email)
        if(uid) DB.admins.push(uid);
        if(email && !DB.admins.includes(email)) DB.admins.push(email);
        showToast(player.nickname+" agora é admin!","green");
      }
      await save();
      render();
    });
  });

  // Delete player
  document.querySelectorAll("[data-del-player]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const uid = btn.dataset.delPlayer;
      const player = DB.players.find(p=>p.uid===uid);
      if(!player) return;
      if(!confirm("Excluir "+player.name+"? Os resultados dele nas etapas serão mantidos.")) return;
      DB.players = DB.players.filter(p=>p.uid!==uid);
      await save();
      showToast(player.name+" removido.","green");
      render();
    });
  });
}

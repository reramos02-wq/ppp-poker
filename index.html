<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0e0e0e"/>
<meta name="description" content="PPP Poker — Gestão de torneios de poker"/>
<title>PPP Poker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#1a1a1a;--bg-dark:#0e0e0e;--surface:#222;--surface2:#2c2c2c;--border:#333;--border2:#3e3e3e;--yellow:#F5A800;--yl:#FFD166;--gray:#808080;--text:#dedede;--muted:#666;--green:#2ecc71;--red:#e74c3c;--blue:#3498db;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg-dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
#result-modal{position:fixed;inset:0;z-index:999;pointer-events:none;}
#result-modal:not(:empty){pointer-events:all;}
#admin-modal{position:fixed;inset:0;z-index:998;pointer-events:none;}
#admin-modal:not(:empty){pointer-events:all;}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:76px;}

/* HEADER */
.hdr{background:var(--bg-dark);border-bottom:2px solid var(--yellow);padding:10px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.hl{display:flex;align-items:center;gap:10px;}
.hn{font-family:'Barlow Condensed',sans-serif;font-weight:900;line-height:1;}
.hn .p1{color:#fff;font-size:20px;}.hn .p2{color:#808080;font-size:20px;}.hn .p3{color:#F5A800;font-size:20px;}.hn .pk{color:#fff;font-size:14px;letter-spacing:2px;margin-left:4px;}
.hsb{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;}
.hbdg{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;padding:4px 10px;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:2px;}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-dark);border-top:2px solid var(--yellow);display:flex;z-index:200;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;gap:3px;cursor:pointer;border:none;border-top:2px solid transparent;margin-top:-2px;background:none;color:var(--muted);transition:color .15s,border-color .15s;font-family:'Barlow Condensed',sans-serif;}
.nb.on{color:var(--yellow);border-top-color:var(--yellow);}
.ni{font-size:17px;line-height:1;}.nl{font-size:8px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}

/* MORE MENU */
.nb-more{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;gap:3px;cursor:pointer;border:none;border-top:2px solid transparent;margin-top:-2px;background:none;color:var(--muted);transition:color .15s,border-color .15s;font-family:'Barlow Condensed',sans-serif;position:relative;}
.nb-more.on{color:var(--yellow);border-top-color:var(--yellow);}
.nb-more.menu-open{color:var(--yellow);border-top-color:var(--yellow);}
.more-icon{font-size:20px;line-height:1;display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;height:20px;}
.more-icon span{display:block;width:16px;height:2px;background:currentColor;border-radius:1px;transition:all .2s;}
.more-menu{position:fixed;bottom:76px;right:0;left:0;margin:0 auto;max-width:480px;background:var(--surface);border:1px solid var(--border);border-bottom:none;border-radius:10px 10px 0 0;overflow:hidden;z-index:199;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.more-menu.open{transform:translateY(0);pointer-events:all;}
.more-menu-backdrop{position:fixed;inset:0;z-index:198;background:rgba(0,0,0,0);pointer-events:none;transition:background .25s;}
.more-menu-backdrop.open{background:rgba(0,0,0,.5);pointer-events:all;}
.more-menu-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:10px auto 6px;}
.more-menu-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:4px 20px 12px;}
.more-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .15s;border-top:1px solid var(--border);}
.more-item:active{background:var(--surface2);}
.more-item.active-item{background:rgba(245,168,0,.06);}
.more-item-icon{font-size:22px;width:28px;text-align:center;flex-shrink:0;}
.more-item-info{flex:1;}
.more-item-label{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;color:#fff;}
.more-item-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.more-item-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);flex-shrink:0;}
.more-safe{height:env(safe-area-inset-bottom,0px);background:var(--surface);}

/* SECTIONS */
.sec{padding:18px 16px;}
@keyframes fu{from{opacity:0}to{opacity:1}}
.st{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;letter-spacing:1px;color:#fff;text-transform:uppercase;margin-bottom:2px;}
.ac{color:var(--yellow);}
.ss{color:var(--muted);font-size:13px;margin-bottom:14px;}
.dv{width:32px;height:3px;background:var(--yellow);margin-bottom:16px;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px;margin-bottom:10px;}
.cy{border-left:3px solid var(--yellow);}.cg{border-left:3px solid var(--green);}.cr{border-left:3px solid var(--red);}

/* TABS */
.tabs{display:flex;margin-bottom:14px;border:1px solid var(--border);border-radius:2px;overflow:hidden;}
.tb{flex:1;padding:9px 4px;text-align:center;cursor:pointer;border:none;background:var(--surface);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .15s;}
.tb.on{background:var(--yellow);color:#000;}

/* RANK LIST */
.rl{background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.rr{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--border);}
.rr:last-child{border-bottom:none;}
.rpos{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.rp1{color:#FFD700;}.rp2{color:#C0C0C0;}.rp3{color:#CD7F32;}.rpx{color:var(--muted);font-size:14px;}
.av{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--yellow);font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}
.avlg{width:52px;height:52px;font-size:15px;border-width:2px;}
.avxl{width:64px;height:64px;font-size:18px;border:3px solid var(--yellow);}
.ri{flex:1;min-width:0;}
.rn{font-size:14px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rm{font-size:11px;color:var(--muted);margin-top:1px;}
.rv{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--yellow);}
.rvl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* STAGES */
.sgc{background:var(--surface);border:1px solid var(--border);border-radius:3px;margin-bottom:10px;overflow:hidden;}
.sgh{padding:12px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px;}
.sgh:active{background:var(--surface2);}
.sgn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;color:#fff;}
.sgm{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.6;}
.sgr{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.sgb{border-top:1px solid var(--border);padding:12px 13px;}
.badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;padding:3px 8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.bdone{background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.25);}
.bnext{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.25);}
.bfuture{background:rgba(245,168,0,.1);color:var(--yellow);border:1px solid rgba(245,168,0,.25);}
.bfin{background:rgba(52,152,219,.12);color:var(--blue);border:1px solid rgba(52,152,219,.25);}
.resrow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1c1c1c;font-size:13px;}
.resrow:last-child{border-bottom:none;}
.respos{width:22px;text-align:center;color:var(--muted);font-size:11px;font-family:'Barlow Condensed',sans-serif;}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.chip{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px 4px 5px;font-size:12px;color:var(--text);}

/* PLAYERS GRID */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pcrd{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px 12px;text-align:center;cursor:pointer;transition:border-color .15s;}
.pcrd:active{border-color:var(--yellow);}
.pn{font-size:13px;font-weight:600;color:#fff;margin-top:8px;}
.pk2{font-size:12px;color:var(--muted);margin-top:2px;}
.psg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;}
.ps{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:10px 8px;text-align:center;}
.psv{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--yellow);}
.psl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* HOF */
.hfc{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.hfr{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;width:32px;text-align:center;flex-shrink:0;}
.hfn{font-size:15px;color:#fff;font-weight:600;}
.hfb{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.hfbdg{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:3px 8px;border-radius:2px;}
.hby{background:rgba(245,168,0,.15);color:var(--yellow);border:1px solid rgba(245,168,0,.3);}
.hbg{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.25);}

/* POINTS TABLE */
.ptable{width:100%;border-collapse:collapse;font-size:13px;}
.ptable th{background:var(--surface2);color:var(--yellow);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
.ptable td{padding:7px 10px;border-bottom:1px solid #1c1c1c;color:var(--text);}
.ptable tr:last-child td{border-bottom:none;}

/* HERO */
.hero{background:var(--bg-dark);border-bottom:1px solid var(--border);padding:24px 18px 22px;position:relative;overflow:hidden;}
.hero::after{content:'';}
.hppp{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:52px;line-height:1;letter-spacing:6px;margin-bottom:4px;}
.hppp .h1{color:#fff;}.hppp .h2{color:#808080;}.hppp .h3{color:#F5A800;}
.hpsub{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-bottom:18px;}
.hsts{display:flex;gap:10px;}
.hst{flex:1;background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--yellow);padding:10px 8px;text-align:center;border-radius:2px;}
.hsv{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:var(--yellow);}
.hsl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.ov-center{align-items:center;}
.modal{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--yellow);padding:22px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:#fff;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}

/* ADMIN */
.atag{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:1px;}
.urow{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--border);}
.urow:last-child{border-bottom:none;}
.rbdg{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:1px;text-transform:uppercase;}
.rm2{background:rgba(255,215,0,.15);color:#FFD700;border:1px solid rgba(255,215,0,.3);}
.ru{background:rgba(128,128,128,.12);color:var(--muted);border:1px solid rgba(128,128,128,.2);}
.rp2{background:rgba(245,168,0,.1);color:var(--yellow);border:1px solid rgba(245,168,0,.25);}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:2px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.by{background:var(--yellow);color:#000;}.bo{background:transparent;border:1px solid var(--border2);color:var(--text);}
.bd{background:transparent;border:1px solid rgba(231,76,60,.4);color:var(--red);}
.br{background:var(--red);color:#fff;}
.sm{padding:6px 12px;font-size:12px;}.fw{width:100%;}

/* INPUTS */
.inp{background:var(--surface2);border:1px solid var(--border2);border-radius:2px;color:var(--text);padding:9px 12px;font-family:'Barlow',sans-serif;font-size:14px;width:100%;transition:border-color .15s;}
.inp:focus{outline:none;border-color:var(--yellow);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
select.inp{appearance:none;}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;display:block;font-family:'Barlow Condensed',sans-serif;font-weight:600;}
.fr{margin-bottom:11px;}

/* UTILS */
.row{display:flex;}.btw{display:flex;justify-content:space-between;align-items:center;}
.g8{gap:8px;}.mt16{margin-top:16px;}.mt12{margin-top:12px;}.mt8{margin-top:8px;}
.mb16{margin-bottom:16px;}.mb10{margin-bottom:10px;}
.empty{text-align:center;padding:34px 20px;color:var(--muted);font-size:15px;}
.sep{height:1px;background:var(--border);margin:14px 0;}
.pill{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;letter-spacing:1px;border-radius:2px;}
.py{background:rgba(245,168,0,.15);color:var(--yellow);}
.hidden{display:none!important;}

/* ── RESPONSIVE: TABLET & DESKTOP (≥768px) ── */
@media(min-width:768px){
  body{background:var(--bg);}

  /* Layout shell */
  #app{max-width:100%;padding-bottom:0;display:flex;min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:240px;flex-shrink:0;
    background:var(--bg-dark);
    border-right:2px solid var(--yellow);
    position:fixed;top:0;left:0;bottom:0;
    display:flex;flex-direction:column;
    z-index:200;overflow-y:auto;
  }
  .sb-logo{
    display:flex;align-items:center;gap:10px;
    padding:20px 18px 16px;
    border-bottom:1px solid var(--border);
  }
  .sb-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;line-height:1;}
  .sb-title .p1{color:#fff;font-size:22px;}
  .sb-title .p2{color:#808080;font-size:22px;}
  .sb-title .p3{color:#F5A800;font-size:22px;}
  .sb-title .pk{color:#fff;font-size:15px;letter-spacing:2px;margin-left:4px;}
  .sb-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
  .sb-nav{flex:1;padding:12px 0;}
  .sb-section-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 18px 6px;}
  .sb-item{
    display:flex;align-items:center;gap:12px;
    padding:11px 18px;cursor:pointer;
    border:none;background:none;width:100%;text-align:left;
    color:var(--muted);font-family:'Barlow Condensed',sans-serif;
    font-size:15px;font-weight:700;letter-spacing:.5px;
    transition:all .15s;border-left:3px solid transparent;
  }
  .sb-item:hover{color:var(--text);background:var(--surface);}
  .sb-item.on{color:var(--yellow);background:rgba(245,168,0,.06);border-left-color:var(--yellow);}
  .sb-item-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
  .sb-badge{
    margin-left:auto;background:var(--red);color:#fff;
    font-size:9px;font-weight:700;padding:2px 6px;letter-spacing:1px;text-transform:uppercase;border-radius:2px;
  }
  .sb-footer{
    padding:14px 18px;border-top:1px solid var(--border);
    font-size:11px;color:var(--muted);line-height:1.6;
  }
  .sb-season{
    font-family:'Barlow Condensed',sans-serif;font-size:13px;
    font-weight:700;color:var(--yellow);letter-spacing:1px;
    margin-bottom:2px;
  }

  /* Main content area */
  .main-wrap{
    margin-left:240px;flex:1;
    max-width:960px;
    min-height:100vh;
  }

  /* Top bar (replaces mobile header) */
  .topbar{
    background:var(--bg-dark);border-bottom:1px solid var(--border);
    padding:12px 28px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
  }
  .topbar-title{
    font-family:'Barlow Condensed',sans-serif;font-weight:900;
    font-size:22px;color:#fff;letter-spacing:1px;text-transform:uppercase;
  }
  .topbar-title .ac{color:var(--yellow);}
  .topbar-right{display:flex;align-items:center;gap:10px;}

  /* Content padding */
  .sec{padding:24px 28px;}
  .hero{padding:32px 28px 28px;}

  /* Hide mobile nav, show sidebar */
  .nav{display:none;}
  .more-menu{display:none;}
  .more-menu-backdrop{display:none;}
  .hdr{display:none;}

  /* Home 2-column grid */
  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:24px 28px;}
  .home-col{min-width:0;}

  /* Hero on desktop */
  .hppp{font-size:64px;}
  .hsts{gap:14px;}
  .hst{padding:14px 10px;}
  .hsv{font-size:28px;}

  /* Players grid - more columns */
  .pgrid{grid-template-columns:repeat(3,1fr);}

  /* Wider modal */
  .ov{align-items:center;}
  .modal{max-width:560px;border-radius:6px;max-height:80vh;}

  /* Rank rows hover */
  .rr:hover{background:var(--surface2);cursor:default;}
  .sgh:hover{background:var(--surface2);}
  .pcrd:hover{border-color:var(--yellow);}
}

@media(min-width:1200px){
  .sidebar{width:260px;}
  .main-wrap{margin-left:260px;max-width:1100px;}
  .pgrid{grid-template-columns:repeat(4,1fr);}
}

/* LOGIN SCREEN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg-dark);}
.login-box{width:100%;max-width:400px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:#fff;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px;text-align:center;}
.login-tabs{display:flex;margin-bottom:20px;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.ltb{flex:1;padding:10px;text-align:center;cursor:pointer;border:none;background:var(--surface);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.ltb.on{background:var(--yellow);color:#000;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:3px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;transition:border-color .15s;}
.google-btn:hover{border-color:var(--yellow);}

// ── CALCULATIONS ──────────────────────────────────────────────────────────────
function calcRank(type){
  const fin = DB.stages.filter(s=>s.status==="finished"&&s.type===type&&!s.isFinal&&(s.season===ACTIVE_SEASON||!s.season));
  const sc = {};
  DB.players.forEach(p=>{ sc[p.uid]={p,total:0,stages:0,ko:0}; });
  fin.forEach(s=>(s.results||[]).forEach(r=>{
    if(!sc[r.playerId])return;
    const pts = getPts(r.position); // recalculate from table, not stored value
    sc[r.playerId].total += pts + (type==="knockout"?(r.knockouts||0)*10:0);
    sc[r.playerId].stages++;
    sc[r.playerId].ko += r.knockouts||0;
  }));
  return Object.values(sc).filter(s=>s.stages>0).sort((a,b)=>b.total-a.total||b.ko-a.ko);
}

function calcRankGeral(){
  const sc = {};
  DB.players.forEach(p=>{ sc[p.uid]={p,total:0,stages:0,ko:0,nlPts:0,koPts:0}; });
  DB.stages.filter(s=>s.status==="finished"&&!s.isFinal&&(s.season===ACTIVE_SEASON||!s.season)).forEach(s=>{
    (s.results||[]).forEach(r=>{
      if(!sc[r.playerId])return;
      const pts = getPts(r.position) + (s.type==="knockout"?(r.knockouts||0)*10:0);
      sc[r.playerId].total += pts;
      sc[r.playerId].stages++;
      sc[r.playerId].ko += r.knockouts||0;
      if(s.type==="nlholdem") sc[r.playerId].nlPts += pts;
      else sc[r.playerId].koPts += pts;
    });
  });
  return Object.values(sc).filter(s=>s.stages>0).sort((a,b)=>b.total-a.total||b.ko-a.ko);
}

function calcStats(uid){
  let p=0,w=0,wNL=0,wKO=0,wFT=0,ft=0,ko=0;
  DB.stages.filter(s=>s.status==="finished"&&(s.season===ACTIVE_SEASON||!s.season)).forEach(s=>{
    const r=(s.results||[]).find(r=>r.playerId===uid);
    if(!r)return;
    if(!s.isFinal) p++;
    if(r.position<=9) ft++;
    if(r.position===1){
      if(s.isFinal)        wFT++;
      else if(s.type==="nlholdem") wNL++;
      else if(s.type==="knockout") wKO++;
      w++;
    }
    ko+=r.knockouts||0;
  });
  return {p,w,wNL,wKO,wFT,ft,ko};
}

function calcHOF(){
  return DB.players.map(pl=>{
    const st = calcStats(pl.uid);
    const hofScore = st.wNL*1 + st.wKO*1 + st.wFT*12;
    return {pl,...st,hofScore};
  }).filter(h=>h.p>0||h.wFT>0).sort((a,b)=>b.hofScore-a.hofScore||b.p-a.p);
}

      copyBtn.textContent="✓ Copiado!";
      setTimeout(function(){ copyBtn.textContent="📋 Copiar"; },2000);
    });
  });
  btns.appendChild(copyBtn);

  // Close
  const closeBtn=document.createElement("button");
  closeBtn.className="btn bo fw";
  closeBtn.textContent="Fechar";
  closeBtn.style.marginTop="8px";
  closeBtn.addEventListener("click",function(){ wrap.innerHTML=""; });
  modal.appendChild(btns);
  modal.appendChild(closeBtn);
}

function openRouteModal(address){
  const encoded = encodeURIComponent(address);
  const wazeUrl = "https://waze.com/ul?q="+encoded+"&navigate=yes";
  const mapsUrl = "https://www.google.com/maps/dir/?api=1&destination="+encoded;

  const wrap = document.getElementById("result-modal");
  wrap.innerHTML="";
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:12px;box-sizing:border-box;";
  wrap.appendChild(ov);
  const box=document.createElement("div");
  box.style.cssText="background:var(--surface);border-top:3px solid var(--yellow);border:1px solid var(--border);border-radius:4px 4px 0 0;padding:20px;width:100%;max-width:480px;box-sizing:border-box;";
  box.addEventListener("click",e=>e.stopPropagation());
  ov.appendChild(box);

  box.innerHTML=`
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:#fff;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">🗺️ Traçar Rota</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">📍 ${address}</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <a href="${wazeUrl}" target="_blank" rel="noopener"
        style="display:flex;align-items:center;gap:12px;background:#08B2D7;color:#fff;padding:14px 16px;border-radius:4px;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.5px">
        <span style="font-size:24px">🚗</span> Abrir no Waze
      </a>
      <a href="${mapsUrl}" target="_blank" rel="noopener"
        style="display:flex;align-items:center;gap:12px;background:#4285F4;color:#fff;padding:14px 16px;border-radius:4px;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.5px">
        <span style="font-size:24px">📍</span> Abrir no Google Maps
      </a>
    </div>
    <button onclick="document.getElementById('result-modal').innerHTML=''" style="width:100%;margin-top:12px;background:none;border:1px solid var(--border2);color:var(--muted);padding:12px;border-radius:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px">Fechar</button>`;

  ov.addEventListener("click",function(e){ if(e.target===ov) wrap.innerHTML=""; });
}

function renderTopbar(){
  const t = ALL_TABS().find(t=>t.id===TAB)||ALL_TABS[0];
  const title = PAGE_TITLES[TAB]||"";
  // Split title for accent on last word
  const words = title.split(" ");
  const accent = words.pop();
  const rest   = words.join(" ");
  return `<div class="topbar">
    <div class="topbar-title">${rest?rest+" ":""}<span class="ac">${accent}</span></div>
    <div class="topbar-right" style="display:flex;align-items:center;gap:8px">
      ${IS_ADMIN?'<span class="hbdg" style="font-size:10px">⚙ ADMIN</span>':""}
      <button id="btn-profile" style="background:none;border:none;cursor:pointer;display:flex;align-items:center">
        <div class="av" style="width:34px;height:34px;font-size:11px;border:2px solid var(--yellow)">${ini(CURRENT_PLAYER?.name||CURRENT_USER?.displayName||"?")}</div>
      </button>
    </div>
  </div>`;
}

function render(){
  try {
    dbg("render() TAB="+TAB+" desktop="+IS_DESKTOP());
    let html = "";
    if(IS_DESKTOP()){
      html = renderSidebar() +
        '<div class="main-wrap">' +
        renderTopbar() +
        '<div id="page">' + (TAB==="home"?renderHomeDesktop():renderPage()) + '</div>' +
        '</div>';
    } else {
      html = '<div id="wrap">' +
        renderHeader() +
        '<div id="page">' + renderPage() + '</div>' +
        renderNav() +
        '</div>';
    }
    document.getElementById("app").innerHTML = html;
    dbg("render() OK");
    bindEvents();
  } catch(e) {
    dbg("ERRO render(): " + e.message + " | " + e.stack?.split("\n")[0]);
    document.getElementById("app").innerHTML =
      '<div style="padding:24px;color:#e74c3c;font-family:monospace;font-size:12px;background:#0e0e0e;min-height:100vh">' +
      '<b>Erro no render():</b><br/>' + e.message + '<br/><br/>' +
      (e.stack||"").replace(/\n/g,"<br/>") + '</div>';
  }
}

function renderLoginScreen(){
  const logo80Src = LOGO_80;
  document.getElementById("app").innerHTML = `
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <img src="${logo80Src}" style="height:72px;width:auto;margin:0 auto 12px;display:block"/>
        <div class="login-title">PPP Poker</div>
        <div class="login-sub">Temporada ${ACTIVE_SEASON}</div>
      </div>
      <div class="login-tabs">
        <button class="ltb${LOGIN_TAB==="login"?" on":""}" id="ltb-login">Entrar</button>
        <button class="ltb${LOGIN_TAB==="signup"?" on":""}" id="ltb-signup">Cadastrar</button>
      </div>
      <div id="login-err"></div>
      <button class="google-btn" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
        Continuar com Google
      </button>
      <div class="divider">ou</div>
      ${LOGIN_TAB==="login"?`
        <div class="fr"><label class="lbl">Email</label><input class="inp" id="auth-email" type="email" placeholder="seu@email.com" autocomplete="email"/></div>
        <div class="fr"><label class="lbl">Senha</label><input class="inp" id="auth-pass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
        <div class="forgot" id="btn-forgot">Esqueci minha senha</div>
        <button class="btn by fw" id="btn-login" style="padding:13px;font-size:16px">Entrar</button>
      `:`
        <div class="fr"><label class="lbl">Nome completo</label><input class="inp" id="auth-name" placeholder="Ex: João da Silva" autocomplete="name"/></div>
        <div class="fr"><label class="lbl">Apelido</label><input class="inp" id="auth-nick" placeholder="Ex: Joãozinho"/></div>
        <div class="fr"><label class="lbl">Email</label><input class="inp" id="auth-email" type="email" placeholder="seu@email.com" autocomplete="email"/></div>
        <div class="fr"><label class="lbl">Senha</label><input class="inp" id="auth-pass" type="password" placeholder="mínimo 6 caracteres" autocomplete="new-password"/></div>
        <button class="btn by fw" id="btn-signup" style="padding:13px;font-size:16px">Criar conta</button>
      `}
    </div>
  </div>`;

  document.getElementById("ltb-login").addEventListener("click",()=>{ LOGIN_TAB="login"; renderLoginScreen(); });
  document.getElementById("ltb-signup").addEventListener("click",()=>{ LOGIN_TAB="signup"; renderLoginScreen(); });

  // Google
  document.getElementById("btn-google").addEventListener("click", async()=>{
    try{
      await signInWithPopup(auth, googleProvider);
    }catch(e){ showLoginError(e.code); }
  });

  if(LOGIN_TAB==="login"){
    document.getElementById("btn-login").addEventListener("click", async()=>{
      const email = document.getElementById("auth-email").value.trim();
      const pass  = document.getElementById("auth-pass").value;
      if(!email||!pass) return;
      try{
        await signInWithEmailAndPassword(auth, email, pass);
      }catch(e){ showLoginError(e.code); }
    });
    // Enter key
    document.getElementById("auth-pass").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("btn-login").click(); });
    document.getElementById("btn-forgot").addEventListener("click", async()=>{
      const email = document.getElementById("auth-email").value.trim();
      if(!email){ showLoginError("auth/missing-email"); return; }
      try{
        await sendPasswordResetEmail(auth, email);
        document.getElementById("login-err").innerHTML='<div class="err-msg" style="background:rgba(46,204,113,.1);border-color:rgba(46,204,113,.3);color:var(--green)">✓ Email de redefinição enviado!</div>';
      }catch(e){ showLoginError(e.code); }
    });
  } else {
    document.getElementById("btn-signup").addEventListener("click", async()=>{
      const name  = document.getElementById("auth-name").value.trim();
      const nick  = document.getElementById("auth-nick").value.trim();
      const email = document.getElementById("auth-email").value.trim();
      const pass  = document.getElementById("auth-pass").value;
      if(!name||!email||!pass){ showLoginError("auth/missing-fields"); return; }
      try{
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        // Store extra info for ensurePlayerProfile
        cred.user._pppNick = nick || name.split(" ")[0];
      }catch(e){ showLoginError(e.code); }
    });
  }
}

function showLoginError(code){
  const msgs = {
    "auth/wrong-password":       "Senha incorreta.",
    "auth/user-not-found":       "Usuário não encontrado.",
    "auth/email-already-in-use": "Email já cadastrado. Faça login.",
    "auth/weak-password":        "Senha muito fraca (mínimo 6 caracteres).",
    "auth/invalid-email":        "Email inválido.",
    "auth/missing-email":        "Digite seu email primeiro.",
    "auth/missing-fields":       "Preencha todos os campos.",
    "auth/popup-closed-by-user": "",
    "auth/too-many-requests":    "Muitas tentativas. Tente mais tarde.",
  };
  const msg = msgs[code] || "Erro ao autenticar. Tente novamente.";
  if(!msg) return;
  const el = document.getElementById("login-err");
  if(el) el.innerHTML = `<div class="err-msg">${msg}</div>`;
}

      <button id="pf-logout" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;text-decoration:underline">Sair da conta</button>
    </div>`;

  box.querySelector("#pf-close").addEventListener("click",()=>{ wrap.innerHTML=""; });
  box.querySelector("#pf-logout").addEventListener("click", async()=>{
    stopListeners();
    await signOut(auth);
    wrap.innerHTML="";
  });
  box.querySelector("#pf-save").addEventListener("click", async()=>{
    const name = box.querySelector("#pf-name").value.trim();
    const nick = box.querySelector("#pf-nick").value.trim();
    const pass  = box.querySelector("#pf-pass").value;
    const pass2 = box.querySelector("#pf-pass2").value;
    const errEl = box.querySelector("#pf-err");
    if(pass && pass!==pass2){ errEl.innerHTML='<div class="err-msg">As senhas não coincidem.</div>'; return; }
    if(pass && pass.length<6){ errEl.innerHTML='<div class="err-msg">Senha muito curta.</div>'; return; }
    try{
      // Update Firebase Auth display name
      if(name) await updateProfile(u, { displayName: name });
      // Update password
      if(pass) await updatePassword(u, pass);
      // Update player in DB array
      const playerIdx = DB.players.findIndex(pl=>pl.uid===u.uid);
      if(playerIdx >= 0){
        DB.players[playerIdx] = {...DB.players[playerIdx], name:name||DB.players[playerIdx].name, nickname:nick||DB.players[playerIdx].nickname};
      }
      CURRENT_PLAYER = DB.players[playerIdx] || CURRENT_PLAYER;
      await save();
      wrap.innerHTML="";
      showToast("Perfil atualizado!","green");
      render();
    }catch(e){
      errEl.innerHTML='<div class="err-msg">Erro: '+e.message+'</div>';
    }
  });
}

function renderPage(){
  switch(TAB){
    case "home":    return renderHome();
    case "ranking": return renderRanking();
    case "stages":  return renderStages();
    case "hof":     return renderHOF();
    case "players": return renderPlayers();
    case "rules":   return renderRules();
    case "admin":   return IS_ADMIN?renderAdmin():'<div class="sec"><div class="empty">Acesso restrito.</div></div>';
    default:        return renderHome();
  }
}

    </div>`).join("")}</div>`:""}
    ${nlTop.length?`

        </div>
      </div>`).join("")}`;
    })()}
  </div>`;

  return `<div style="">
    ${heroHtml}
    <div class="home-grid">${col1}${col2}</div>
  </div>`;
}

// ── RANKING ───────────────────────────────────────────────────────────────────
function renderRanking(){
  const list = RANK_TAB==="geral"?calcRankGeral():calcRank(RANK_TAB);
  const isKO = RANK_TAB==="knockout";
  const isGeral = RANK_TAB==="geral";
  return `<div class="sec">
  <div class="st">Rank<span class="ac">ing</span></div><div class="ss">Temporada 2026</div><div class="dv"></div>
  <div class="tabs">
    <button class="tb${RANK_TAB==="geral"?" on":""}" data-rtab="geral">🏅 Geral</button>
    <button class="tb${RANK_TAB==="nlholdem"?" on":""}" data-rtab="nlholdem">🃏 NL Hold'em</button>
    <button class="tb${RANK_TAB==="knockout"?" on":""}" data-rtab="knockout">🥊 Knockout</button>
  </div>
  ${list.length===0?'<div class="empty">Nenhum resultado registrado.</div>':''}
  <div class="rl">${list.map((r,i)=>`<div class="rr">
    <div class="rpos ${pcls(i)}">${i+1}</div>${AV(r.p.uid)}
    <div class="ri">
      <div class="rn">${r.p.nickname}</div>
      <div class="rm">${r.stages} etapa${r.stages!==1?"s":""}${isKO?` · 🥊 ${r.ko}`:""}${isGeral&&r.ko>0?` · 🥊 ${r.ko}`:""}${isGeral?` <span style="font-size:10px;color:var(--muted)">(🃏${r.nlPts} + 🥊${r.koPts})</span>`:""}</div>
    </div>
    <div><div class="rv">${r.total}</div><div class="rvl">pts</div></div>
  </div>`).join("")}</div>
  </div>`;
}

// ── STAGES ────────────────────────────────────────────────────────────────────
function renderStages(){
  if(STAGE_DETAIL) return renderStageDetail(STAGE_DETAIL);
  const upcoming = DB.stages.filter(s=>s.status==="upcoming");
  const nextId = upcoming.length>0?upcoming[0].id:null;
  return `<div class="sec">
  <div class="st">Eta<span class="ac">pas</span></div><div class="ss">Calendário da temporada</div><div class="dv"></div>
  ${DB.stages.length===0?'<div class="empty">Nenhuma etapa cadastrada.</div>':''}
  ${DB.stages.map(s=>{
    const ins  = s.inscriptions||[];
    const isNext = s.id===nextId && s.status==="upcoming";
    const badgeCls = s.isFinal?"bfin":s.status==="finished"?"bdone":isNext?"bnext":"bfuture";
    const badgeLbl = s.isFinal?"🏆 Final":s.status==="finished"?"Encerrada":isNext?"Próxima":"Futura";
    return `<div class="sgc" data-detail="${s.id}" style="cursor:pointer">
      <div class="sgh" style="pointer-events:none">
        <div style="flex:1">
          <div class="sgn">${s.name}${s.isFinal?" 🏆":""}</div>
          <div class="sgm">${fmtD(s.date)}${s.time?" às "+s.time:""}${s.location?" · "+s.location:""}<br/>${s.type==="nlholdem"?"🃏 NL Hold'em":"🥊 Knockout"}${s.isFinal?" · Mesa Final":""}</div>
        </div>
        <div class="sgr">
          <span class="badge ${badgeCls}">${badgeLbl}</span>
          <span style="color:var(--muted);font-size:18px">›</span>
        </div>
      </div>
    </div>`;
  }).join("")}
  </div>`;
}

function renderStageDetail(sid){
  const s = DB.stages.find(x=>x.id===sid); if(!s) return renderStages();
  const ins = s.inscriptions||[];
  const iAmIn = ins.includes(CURRENT_USER_UID||"");
  const upcoming = DB.stages.filter(x=>x.status==="upcoming");
  const isNext = upcoming.length>0 && upcoming[0].id===s.id;
  const badgeCls = s.isFinal?"bfin":s.status==="finished"?"bdone":isNext?"bnext":"bfuture";
  const badgeLbl = s.isFinal?"🏆 Final":s.status==="finished"?"Encerrada":isNext?"Próxima":"Futura";
  const tipo = s.type==="nlholdem"?"🃏 NL Hold'em":"🥊 Knockout";

  return `<div class="sec">
    <!-- Back button -->
    <button data-back-stages style="display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:0;margin-bottom:14px">
      ‹ Todas as etapas
    </button>

function renderHOF(){
  const hof = calcHOF();
  return `<div class="sec">
  <div class="st">Hall of <span class="ac">Fame</span></div>
  <div class="ss">Pontuação: 🃏 NLH=1pt · 🥊 KO=1pt · 🏆 Mesa Final=12pts</div><div class="dv"></div>
  ${hof.length===0?'<div class="empty">Nenhuma etapa encerrada ainda.</div>':''}
  ${hof.map((h,i)=>{
    const maxScore = hof.length>0?hof[0].hofScore:0;
    const isTop = h.hofScore===maxScore && maxScore>0;
    return `<div class="hfc" style="cursor:pointer${isTop?';border-color:rgba(255,215,0,.3);border-top:2px solid #FFD700':''}" data-profile="${h.pl.uid}">
      <div class="hfr ${pcls(i)}">${i+1}</div>
      ${AV(h.pl.uid,"lg")}
      <div style="flex:1;min-width:0">
        <div class="hfn">${h.pl.name} <span style="color:var(--muted);font-size:13px;font-weight:400">"${h.pl.nickname}"</span></div>
        <div class="hfb">
          ${h.wNL>0?`<span class="hfbdg hby">🃏 ${h.wNL}</span>`:''}
          ${h.wKO>0?`<span class="hfbdg hby">🥊 ${h.wKO}</span>`:''}
          ${h.wFT>0?`<span class="hfbdg" style="background:rgba(52,152,219,.15);color:var(--blue);border:1px solid rgba(52,152,219,.3)">🏆 FT ${h.wFT}</span>`:''}
          ${h.p>0?`<span class="hfbdg hbg">▶ ${h.p} etapa${h.p!==1?'s':''}</span>`:''}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--yellow)">${h.hofScore}</div>
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">pts HOF</div>
      </div>
    </div>`;
  }).join("")}
  <div style="margin-top:14px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:3px;font-size:12px;color:var(--muted);line-height:1.8">
    <b style="color:var(--text)">Como funciona a pontuação HOF:</b><br/>
    🃏 Vitória em NL Hold'em = <b style="color:var(--yellow)">1 ponto</b><br/>
    🥊 Vitória em Knockout = <b style="color:var(--yellow)">1 ponto</b><br/>
    🏆 Vitória em Mesa Final = <b style="color:var(--yellow)">12 pontos</b>
  </div>
  <div id="profile-slot"></div>
  </div>`;
}

function openEditRulesModal(){
  const wrap=document.getElementById("result-modal");
  wrap.innerHTML="";
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;padding:12px;box-sizing:border-box;";
  wrap.appendChild(ov);
  const box=document.createElement("div");
  box.style.cssText="background:var(--surface);border-top:3px solid var(--yellow);border:1px solid var(--border);border-radius:4px;padding:20px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-sizing:border-box;";
  box.addEventListener("click",e=>e.stopPropagation());
  ov.addEventListener("click",e=>{if(e.target===ov) wrap.innerHTML="";});
  ov.appendChild(box);
  function field(id,lbl,val,ph){return `<div class="fr"><label class="lbl">${lbl}</label><input class="inp" id="${id}" value="${val||""}" placeholder="${ph}"/></div>`;}
  box.innerHTML=`
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:#fff;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">✏️ Editar Regras Padrão</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Valores usados como padrão ao criar novas etapas.</div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;color:var(--yellow);text-transform:uppercase;margin-bottom:10px">🃏 NL Hold'em</div>
    ${field("er-nl-bi","Buy-in",DEFAULT_RULES.nlholdem.buyin,"Ex: R$ 150 (20k)")}
    ${field("er-nl-rb","Rebuy",DEFAULT_RULES.nlholdem.rebuy,"Ex: R$ 100 (20k) / R$ 180 (40k)")}
    ${field("er-nl-ao","Add-on",DEFAULT_RULES.nlholdem.addon,"Ex: R$ 150 (40k)")}
    ${field("er-nl-tc","Time Chip",DEFAULT_RULES.nlholdem.timechip,"Ex: 5k início 1º nível")}
    <div style="height:1px;background:var(--border);margin:10px 0 14px"></div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;color:var(--yellow);text-transform:uppercase;margin-bottom:10px">🥊 Knockout</div>
    ${field("er-ko-bi","Buy-in",DEFAULT_RULES.knockout.buyin,"Ex: R$ 200 (20k + 1 KO)")}
    ${field("er-ko-rb","Rebuy",DEFAULT_RULES.knockout.rebuy,"Ex: R$ 200 (20k+1KO) / R$ 300 (40k+1KO)")}
    ${field("er-ko-ao","Add-on",DEFAULT_RULES.knockout.addon,"Ex: R$ 200 (40k)")}
    ${field("er-ko-tc","Time Chip",DEFAULT_RULES.knockout.timechip,"Ex: —")}
    <div class="row g8" style="margin-top:14px">
      <button class="btn by fw" id="er-save">✓ Salvar</button>
      <button class="btn bo" id="er-cancel">Cancelar</button>
    </div>`;
  box.querySelector("#er-cancel").addEventListener("click",()=>{ wrap.innerHTML=""; });
  box.querySelector("#er-save").addEventListener("click",()=>{
    DEFAULT_RULES.nlholdem={buyin:document.getElementById("er-nl-bi").value.trim(),rebuy:document.getElementById("er-nl-rb").value.trim(),addon:document.getElementById("er-nl-ao").value.trim(),timechip:document.getElementById("er-nl-tc").value.trim()};
    DEFAULT_RULES.knockout={buyin:document.getElementById("er-ko-bi").value.trim(),rebuy:document.getElementById("er-ko-rb").value.trim(),addon:document.getElementById("er-ko-ao").value.trim(),timechip:document.getElementById("er-ko-tc").value.trim()};
    saveRules();
    wrap.innerHTML="";
    render();
  });
}

}

// ── RESULT MODAL ──────────────────────────────────────────────────────────────
let autoSaveTimer = null;

function openResultModal(sid){
  var stage=DB.stages.find(function(s){return s.id===sid;});
  if(!stage)return;
  resultStage=stage;
  var draft=stage.draft||[];
  var results=stage.results||[];
  var base=(stage.inscriptions||[]).map(function(uid){
    var dr=draft.find(function(r){return r.uid===uid;});
    var ex=results.find(function(r){return r.playerId===uid;});
    if(dr) return {uid:uid, pos:dr.pos||"", ko:dr.ko||"0"};
    if(ex) return {uid:uid, pos:String(ex.position), ko:String(ex.knockouts||0)};
    return {uid:uid, pos:"", ko:"0"};
  });
  results.forEach(function(r){
    if(!base.find(function(x){return x.uid===r.playerId;}))
      base.push({uid:r.playerId, pos:String(r.position), ko:String(r.knockouts||0)});
  });
  resultRows=base;
  drawResultModal();
}

function autoSaveDraft(){
  if(!resultStage)return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(function(){
    DB.stages=DB.stages.map(function(s){
      if(s.id!==resultStage.id)return s;
      return Object.assign({},s,{draft:resultRows.map(function(r){return {uid:r.uid,pos:r.pos,ko:r.ko};})});
    });
    save();
    var ind=document.getElementById("autosave-ind");
    if(ind){ind.textContent="✓ Salvo";ind.style.color="var(--green)";}
    setTimeout(function(){var ind=document.getElementById("autosave-ind");if(ind)ind.textContent="";},2000);
  },800);
}

function drawResultModal(){
  var s=resultStage;
  var isKO=s.type==="knockout";
  var hasPublished=s.status==="finished";
  var maxPos=Math.max(resultRows.length,2);

  function takenBy(exceptUid){
    return resultRows.filter(function(r){return r.uid!==exceptUid&&r.pos&&parseInt(r.pos)>0;}).map(function(r){return parseInt(r.pos);});
  }
  function sortedRows(){
    return resultRows.slice().sort(function(a,b){
      var pa=parseInt(a.pos)>0?parseInt(a.pos):9999;
      var pb=parseInt(b.pos)>0?parseInt(b.pos):9999;
      return pa-pb;
    });
  }
  var notIn=DB.players.filter(function(p){return !resultRows.find(function(r){return r.uid===p.uid;});});
  var wrap=document.getElementById("result-modal");
  wrap.innerHTML="";
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;display:flex;align-items:center;justify-content:center;padding:12px;box-sizing:border-box;";
  wrap.appendChild(ov);
  var box=document.createElement("div");
  box.style.cssText="background:var(--surface);border-top:3px solid var(--yellow);border:1px solid var(--border);border-radius:4px;padding:20px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-sizing:border-box;";
  ["click","mousedown","touchstart"].forEach(function(ev){box.addEventListener(ev,function(e){e.stopPropagation();},{passive:true});});
  ov.appendChild(box);
  var tRow=document.createElement("div");
  tRow.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px";
  tRow.innerHTML="<b style=\"font-family:'Barlow Condensed',sans-serif;font-size:20px;color:#fff;text-transform:uppercase;letter-spacing:1px\">Resultado \u2014 "+s.name+"</b><span id='autosave-ind' style='font-size:11px;color:var(--muted)'></span>";
  box.appendChild(tRow);
  var bn=document.createElement("div");
  bn.style.cssText="font-size:12px;padding:8px 12px;border-radius:3px;margin-bottom:12px;border:1px solid;"+(hasPublished?"background:rgba(46,204,113,.1);color:var(--green);border-color:rgba(46,204,113,.3);":"background:rgba(245,168,0,.08);color:var(--yellow);border-color:rgba(245,168,0,.2);");
  bn.textContent=hasPublished?"\u2713 Resultado publicado":"\uD83D\uDD8A Rascunho \u2014 preencha e publique ao final";
  box.appendChild(bn);
  var hdr=document.createElement("div");
  hdr.style.cssText="display:grid;grid-template-columns:1fr 110px"+(isKO?" 80px":"")+";gap:8px;padding:0 4px;margin-bottom:6px;";
  hdr.innerHTML="<div class='lbl' style='margin:0'>Jogador</div><div class='lbl' style='margin:0;text-align:center'>Posi\u00e7\u00e3o</div>"+(isKO?"<div class='lbl' style='margin:0;text-align:center'>KOs</div>":"");
  box.appendChild(hdr);
  var listEl=document.createElement("div");
  box.appendChild(listEl);

  function rebuildList(){
    listEl.innerHTML="";
    sortedRows().forEach(function(row){
      var pl=getP(row.uid)||{name:"?",nickname:"?"};
      var curPos=parseInt(row.pos)>0?parseInt(row.pos):0;
      var pts=curPos?getPts(curPos):0;
      var rd=document.createElement("div");
      rd.style.cssText="display:grid;grid-template-columns:1fr 110px"+(isKO?" 80px":"")+";gap:8px;margin-bottom:8px;align-items:center;padding:10px 10px;border-radius:4px;border:2px solid "+(curPos?"var(--yellow)":"var(--border)")+";background:"+(curPos?"var(--surface2)":"var(--surface)")+";";
      var info=document.createElement("div");
      info.style.cssText="display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden";
      info.innerHTML="<div class='av' style='width:32px;height:32px;font-size:10px;flex-shrink:0'>"+ini(pl.name)+"</div><div style='min-width:0'><div style='font-size:14px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis'>"+pl.nickname+"</div><div style='font-size:11px;font-weight:700;font-family:Barlow Condensed,sans-serif;color:"+(curPos?"var(--yellow)":"var(--muted)")+"'>"+(curPos?curPos+"\u00ba \u00b7 "+pts+" pts":"sem posi\u00e7\u00e3o")+"</div></div>";
      rd.appendChild(info);
      var ps=document.createElement("select");
      ps.style.cssText="background:var(--surface2);border:2px solid "+(curPos?"var(--yellow)":"var(--border2)")+";border-radius:4px;color:#fff;padding:10px 2px;text-align:center;text-align-last:center;font-size:17px;font-family:Barlow Condensed,sans-serif;font-weight:900;width:100%;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;";
      var optsHtml="<option value=''>—</option>";
      for(var i=1;i<=maxPos;i++) optsHtml+="<option value='"+i+"'"+(curPos===i?" selected":"")+">"+i+"\u00ba</option>";
      ps.innerHTML=optsHtml;
      (function(rowRef,psEl,rdEl){
        psEl.addEventListener("change",function(){
          var newPos=parseInt(psEl.value)||0;
          var oldPos=parseInt(rowRef.pos)||0;
          if(newPos>0&&newPos!==oldPos){
            var shifted=[];
            function shiftDown(pos,skipUid){
              var occupant=resultRows.find(function(r){return r.uid!==skipUid&&parseInt(r.pos)===pos;});
              if(occupant&&shifted.indexOf(occupant.uid)<0){shifted.push(occupant.uid);shiftDown(pos+1,occupant.uid);occupant.pos=String(pos+1);}
            }
            shiftDown(newPos,rowRef.uid);
          }
          rowRef.pos=psEl.value;
          maxPos=Math.max(maxPos,resultRows.reduce(function(m,r){return Math.max(m,parseInt(r.pos)||0);},0));
          autoSaveDraft();
          rebuildList();
        });
      })(row,ps,rd);
      rd.appendChild(ps);
      if(isKO){
        var curKO=parseInt(row.ko)||0;
        var ks=document.createElement("select");
        ks.style.cssText="background:var(--surface2);border:2px solid var(--border2);border-radius:4px;color:#fff;padding:10px 2px;text-align:center;text-align-last:center;font-size:15px;font-family:Barlow Condensed,sans-serif;font-weight:700;width:100%;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;";
        var koH="";
        for(var k=0;k<=maxPos;k++) koH+="<option value='"+k+"'"+(curKO===k?" selected":"")+">"+k+" \uD83E\uDD4A</option>";
        ks.innerHTML=koH;
        (function(rowRef,ksEl){ksEl.addEventListener("change",function(){rowRef.ko=ksEl.value;autoSaveDraft();});})(row,ks);
        rd.appendChild(ks);
      }
      listEl.appendChild(rd);
    });
  }
  rebuildList();

  if(notIn.length){
    var addSec=document.createElement("div");
    addSec.style.cssText="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)";
    addSec.innerHTML="<div class='lbl' style='margin-bottom:8px'>Adicionar jogador \u00e0 etapa</div>";
    var addRow=document.createElement("div");
    addRow.style.cssText="display:flex;gap:8px";
    var addSel=document.createElement("select");
    addSel.style.cssText="flex:1;background:var(--surface2);border:2px solid var(--border2);border-radius:4px;color:#fff;padding:10px 12px;font-size:14px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;";
    addSel.innerHTML="<option value=''>Selecionar jogador...</option>"+notIn.map(function(p){return "<option value='"+p.uid+"'>"+p.nickname+" \u2014 "+p.name+"</option>";}).join("");
    var addBtn=document.createElement("button");
    addBtn.className="btn by";addBtn.style.cssText="padding:10px 16px;white-space:nowrap;flex-shrink:0";addBtn.textContent="+ Adicionar";
    addBtn.addEventListener("click",function(){var uid=addSel.value;if(!uid)return;if(!resultRows.find(function(r){return r.uid===uid;})){resultRows.push({uid:uid,pos:"",ko:"0"});drawResultModal();}});
    addRow.appendChild(addSel);addRow.appendChild(addBtn);addSec.appendChild(addRow);box.appendChild(addSec);
  }
  var hint=document.createElement("div");
  hint.style.cssText="font-size:11px;color:var(--muted);margin-top:12px;margin-bottom:16px";
  hint.textContent="Posi\u00e7\u00f5es j\u00e1 usadas ficam desativadas. Rascunho salvo automaticamente.";
  box.appendChild(hint);
  var btns=document.createElement("div");btns.className="row g8";
  var pubBtn=document.createElement("button");pubBtn.className="btn fw";pubBtn.style.cssText="background:var(--green);color:#000;font-size:15px;font-weight:900";
  pubBtn.textContent=hasPublished?"\u2713 Atualizar Publica\u00e7\u00e3o":"\uD83C\uDFC1 Publicar Resultado";
  pubBtn.addEventListener("click",function(){
    var filled=resultRows.filter(function(r){return r.pos&&parseInt(r.pos)>0;});
    if(!filled.length){showToast("Selecione pelo menos uma posição antes de publicar.","red");return;}
    var results=filled.sort(function(a,b){return parseInt(a.pos)-parseInt(b.pos);}).map(function(r){return {playerId:r.uid,position:parseInt(r.pos),points:getPts(parseInt(r.pos)),knockouts:parseInt(r.ko)||0};});
    DB.stages=DB.stages.map(function(st){return st.id===resultStage.id?Object.assign({},st,{status:"finished",results:results,draft:null}):st;});
    save();closeResultModal();render();
  });
  btns.appendChild(pubBtn);
  var closeBtn=document.createElement("button");closeBtn.className="btn bo";closeBtn.textContent="Fechar";closeBtn.addEventListener("click",closeResultModal);
  btns.appendChild(closeBtn);box.appendChild(btns);
}

function closeResultModal(){
  clearTimeout(autoSaveTimer);
  var el=document.getElementById("result-modal");if(el)el.innerHTML="";
}

  document.getElementById("btn-profile")?.addEventListener("click",()=>renderProfileModal());

  document.querySelectorAll("[data-more-tab]").forEach(el=>{el.addEventListener("click",()=>{TAB=el.dataset.moreTab;EXPANDED=null;STAGE_DETAIL=null;MENU_OPEN=false;render();window.scrollTo(0,0);});});
  document.getElementById("menu-backdrop")?.addEventListener("click",()=>{
    MENU_OPEN=false;

  document.querySelectorAll("[data-goto]").forEach(el=>{el.addEventListener("click",()=>{TAB=el.dataset.goto;EXPANDED=null;MENU_OPEN=false;render();});});
  document.querySelectorAll("[data-goto-expand]").forEach(el=>{el.addEventListener("click",()=>{TAB="stages";STAGE_DETAIL=el.dataset.gotoExpand;MENU_OPEN=false;render();});});
  // Stage detail page
  document.querySelectorAll("[data-detail]").forEach(el=>{
    el.addEventListener("click",()=>{STAGE_DETAIL=el.dataset.detail;render();window.scrollTo(0,0);});
  });
  document.querySelectorAll("[data-back-stages]").forEach(el=>{
    el.addEventListener("click",()=>{STAGE_DETAIL=null;render();window.scrollTo(0,0);});
  });
  document.querySelectorAll("[data-expand]").forEach(el=>{el.addEventListener("click",()=>{EXPANDED=EXPANDED===el.dataset.expand?null:el.dataset.expand;render();});});
  document.querySelectorAll("[data-rtab]").forEach(btn=>{btn.addEventListener("click",()=>{RANK_TAB=btn.dataset.rtab;render();});});
  document.querySelectorAll("[data-rtab2]").forEach(btn=>{btn.addEventListener("click",()=>{RULES_TAB=btn.dataset.rtab2;render();});});
  document.querySelectorAll("[data-rview]").forEach(btn=>{btn.addEventListener("click",()=>{RULES_VIEW=btn.dataset.rview;render();});});
  document.querySelectorAll("[data-atab]").forEach(btn=>{btn.addEventListener("click",()=>{ADMIN_TAB=btn.dataset.atab;render();});});
  document.querySelectorAll("[data-profile]").forEach(el=>{el.addEventListener("click",()=>showProfile(el.dataset.profile));});
  document.getElementById("btn-new-stage")?.addEventListener("click",()=>openStageModal());
  document.querySelectorAll("[data-edit-stage]").forEach(btn=>{btn.addEventListener("click",()=>openStageModal(DB.stages.find(s=>s.id===btn.dataset.editStage)));});
  document.querySelectorAll("[data-del-stage]").forEach(btn=>{btn.addEventListener("click",()=>{if(confirm("Excluir esta etapa?")){DB.stages=DB.stages.filter(s=>s.id!==btn.dataset.delStage);save();render();}});});
  document.querySelectorAll("[data-launch]").forEach(btn=>{btn.addEventListener("click",()=>openResultModal(btn.dataset.launch));});
  document.querySelectorAll("[data-rm-ins]").forEach(btn=>{btn.addEventListener("click",e=>{e.stopPropagation();const[sid,uid]=btn.dataset.rmIns.split("|");DB.stages=DB.stages.map(s=>s.id===sid?{...s,inscriptions:(s.inscriptions||[]).filter(i=>i!==uid)}:s);save();render();});});
  document.querySelectorAll("[data-add-ins-toggle]").forEach(btn=>{
    btn.addEventListener("click",e=>{e.stopPropagation();const sid=btn.dataset.addInsToggle;const dd=document.getElementById("add-ins-dropdown-"+sid);if(!dd)return;const isOpen=dd.style.display!=="none";document.querySelectorAll("[id^='add-ins-dropdown-']").forEach(el=>el.style.display="none");dd.style.display=isOpen?"none":"block";});
  });
  document.querySelectorAll("[data-add-ins]").forEach(btn=>{
    btn.addEventListener("click",e=>{e.stopPropagation();const[sid,uid]=btn.dataset.addIns.split("|");const stage=DB.stages.find(s=>s.id===sid);if(!stage)return;const ins=stage.inscriptions||[];if(!ins.includes(uid)){DB.stages=DB.stages.map(s=>s.id===sid?{...s,inscriptions:[...ins,uid]}:s);save();render();}});
  });
  document.addEventListener("click",()=>{document.querySelectorAll("[id^='add-ins-dropdown-']").forEach(el=>el.style.display="none");});
  document.querySelectorAll("[data-inscribe]").forEach(btn=>{
    btn.addEventListener("click",e=>{e.stopPropagation();const sid=btn.dataset.inscribe;const stage=DB.stages.find(s=>s.id===sid);if(!stage)return;const ins=stage.inscriptions||[];const alreadyIn=ins.includes(CURRENT_USER_UID);stage.inscriptions=alreadyIn?ins.filter(i=>i!==CURRENT_USER_UID):[...ins,CURRENT_USER_UID];save();render();});
  });
  document.querySelectorAll("[data-share-ins]").forEach(btn=>{
    btn.addEventListener("click",e=>{e.stopPropagation();const sid=btn.dataset.shareIns;const stage=DB.stages.find(s=>s.id===sid);if(!stage)return;openShareModal(stage);});
  });
  // New player (removed from UI)
}

// ── ENSURE PLAYER PROFILE ─────────────────────────────────────────────────────
async function ensurePlayerProfile(user){
  // Try to find player by uid first, then by email
  let player = DB.players.find(p=>p.uid===user.uid);
  if(!player && user.email){
    // Match by email — link this Firebase user to existing player
    player = DB.players.find(p=>p.email===user.email || 
      (p.name||"").toLowerCase().replace(/\s+/g,"") === (user.displayName||"").toLowerCase().replace(/\s+/g,"")
    );
    if(player && player.uid !== user.uid){
      // Update the player uid to match Firebase Auth uid
      player.uid = user.uid;
      player.email = user.email;
    }
  }
  if(!player){
    // Create new player for this user
    const nick = user.displayName?.split(" ")[0] || user.email.split("@")[0];
    const newPlayer = {
      uid: user.uid,
      name: user.displayName || nick,
      nickname: nick,
      email: user.email,
      season: ACTIVE_SEASON
    };
    DB.players.push(newPlayer);
    await save();
    player = newPlayer;
  }
  CURRENT_PLAYER = player;
}

// ── FIRESTORE LISTENERS (real-time) ──────────────────────────────────────────
let _unsubListeners = [];
function stopListeners(){ _unsubListeners.forEach(fn=>fn()); _unsubListeners=[]; }

function startListeners(user){
  stopListeners();
  dbg("14. Conectando ao Firestore...");
  // Listen to season document
  const unsub = onSnapshot(
    doc(db,"seasons",ACTIVE_SEASON),
    (snap)=>{
      dbg("15. Firestore snapshot recebido, exists=" + snap.exists());
      if(snap.exists()){
        const data = snap.data();
        DB.players = data.players || [];
        DB.stages  = data.stages  || [];
        dbg("16. Players=" + DB.players.length + " Stages=" + DB.stages.length);
        // If document exists but is empty, seed it
        // Re-seed if UIDs don't match (first run after UID update)
        const hasRealUID = DB.players.some(p=>p.uid==="gY9rlC6lWBVJ6famgEo3UJnLHqK2");
        if(DB.players.length === 0 && DB.stages.length === 0 || !hasRealUID){
          dbg("17. Atualizando dados com UIDs reais...");
          setDoc(doc(db,"seasons",ACTIVE_SEASON), {
            players: SEED.players,
            stages:  SEED.stages,
            updatedAt: serverTimestamp()
          }).then(()=>{ dbg("SEED enviado com sucesso!"); })
            .catch(e=>{ dbg("ERRO seed: " + e.message); });
          DB.players = SEED.players;
          DB.stages  = SEED.stages;
        }
      } else {
        dbg("16. Documento 2026 NAO existe! Criando...");
        setDoc(doc(db,"seasons",ACTIVE_SEASON), {
          players: SEED.players,
          stages:  SEED.stages,
          updatedAt: serverTimestamp()
        }).then(()=>{ dbg("17. SEED criado!"); })
          .catch(e=>{ dbg("ERRO ao criar seed: " + e.message); });
        DB.players = SEED.players;
        DB.stages  = SEED.stages;
      }
      // Link user to player after data is loaded
      if(user && DB.players.length > 0){
        ensurePlayerProfile(user).then(()=>{
          dbg("18. Renderizando app...");
          render();
        });
      } else {
        CURRENT_PLAYER = DB.players.find(p=>p.uid===CURRENT_USER_UID) || null;
        dbg("18. Renderizando app...");
        render();
      }
    },
    (err)=>{
      dbg("ERRO Firestore: " + err.code + " - " + err.message);
      // Fallback: render with SEED data
      DB.players = SEED.players;
      DB.stages  = SEED.stages;
      render();
    }
  );
  _unsubListeners.push(unsub);

  // Listen to rules config (non-blocking)
  try {
    const unsubRules = onSnapshot(doc(db,"config","rules"), (snap)=>{
      if(snap.exists()){
        const data = snap.data();
        // Only use if has actual content
        if(data.nlholdem && data.nlholdem.buyin){
          DEFAULT_RULES = data;
        }
      }
    }, (e)=>{ console.warn("Rules listener:", e.message); });
    _unsubListeners.push(unsubRules);
  } catch(e) { console.warn("Rules setup:", e.message); }
}
